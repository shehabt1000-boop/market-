    <style>
        /* تعريف خط كايرو محلياً لزيادة السرعة ومنع ظهور الخط العادي */
        @font-face {
            font-family: 'Cairo';

        @font-face {

        body { font-family: 'Cairo', sans-serif; background-color: #eef2f6; overflow-x: hidden; }
        button, a, select, input, .optimized-card { touch-action: manipulation; }
        .ad-container:empty { display: none !important; }
        .nav-link-active { border-bottom: 3px solid #fbbf24; color: #fbbf24 !important; }
        .sidebar-scroll::-webkit-scrollbar { height: 4px; width: 4px; }
        .sidebar-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        * { transition: background-color 0.2s, color 0.2s, border-color 0.2s; } 
        .bg-soft-white { background-color: #fafbfc; }
        
        @keyframes highlightPulse {
            0% { box-shadow: 0 0 0 4px #facc15; transform: scale(1.02); border-color: #facc15; }
            10% { box-shadow: 0 0 0 6px rgba(250, 204, 21, 0.8); }
            80% { box-shadow: 0 0 0 2px rgba(250, 204, 21, 0.4); transform: scale(1.01); }
            100% { box-shadow: 0 0 0 0px rgba(250, 204, 21, 0); transform: scale(1); border-color: #e5e7eb; }

        @keyframes toastSlideIn {

<body class="pb-20 lg:pb-0 text-gray-800">

    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef, useMemo, useCallback } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
        import { initializeFirestore, persistentLocalCache, persistentMultipleTabManager, collection, onSnapshot, query, orderBy, limit } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

        const toNumericId = (str) => {
            if (!str) return '';
            let hash = 0;
            for (let i = 0; i < str.length; i++) { hash = ((hash << 5) - hash) + str.charCodeAt(i); hash |= 0; }
            return String(1000 + (Math.abs(hash) % 9000));
        };

        const getCleanBaseUrl = () => {
            let url = window.location.origin + window.location.pathname;
            return url.replace(/\/index\.html$/, '/');
        };

        const firebaseConfig = {
            apiKey: "AIzaSyANg4wLchZaikXneXr1c3qhRgcOnvPbfoA",
            authDomain: "faculty-of-commerce-2026.firebaseapp.com",
            projectId: "faculty-of-commerce-2026",
            storageBucket: "faculty-of-commerce-2026.firebasestorage.app",
            messagingSenderId: "350727231766",
            appId: "1:350727231766:web:b08a0f335e38bfc2e79837"
        };

        const app = initializeApp(firebaseConfig);
        const db = initializeFirestore(app, { localCache: persistentLocalCache({tabManager: persistentMultipleTabManager()}) });

        const isVideoUrl = (url) => {
            if (!url) return false;
            return url.match(/\.(mp4|webm|ogg|mov)$/i) || url.includes('/video/upload/');
        };

        const getThumbnail = (url, type = 'default') => {
            if (!url) return '';
            if (url.includes('cloudinary.com')) {
                let transform = '/upload/w_300,h_300,c_fill,q_auto:eco,f_auto/';
                if (type === 'a4') transform = '/upload/w_200,h_280,c_fill,q_auto:eco,f_auto/';
                if (type === 'slider') transform = '/upload/w_800,h_400,c_fit,q_auto:eco,f_auto/';
                
                if (url.toLowerCase().endsWith('.pdf')) return url.replace('/upload/', transform).replace(/\.pdf$/i, '.jpg');
                if (isVideoUrl(url)) return url.replace('/upload/', transform).replace(/\.(mp4|webm|ogg|mov)$/i, '.jpg');
                return url.replace('/upload/', transform);
            }
            return url;
        };

        const Toast = React.memo(({ message, type }) => {
            if (!message) return null;
            const bgClass = type === 'error' ? 'bg-red-600' : type === 'success' ? 'bg-green-600' : 'bg-blue-800';
            const icon = type === 'error' ? 'fa-triangle-exclamation' : type === 'success' ? 'fa-check-circle' : 'fa-circle-notch fa-spin';

            return (
                <div className={`fixed top-20 lg:top-24 left-1/2 -translate-x-1/2 ${bgClass} text-white px-5 py-2.5 rounded-full shadow-lg text-xs font-bold z-[999] flex items-center gap-3 whitespace-nowrap toast-animate`}>
                    <i className={`fa-solid ${icon} text-sm`} style={icon.includes('spin') ? {animation: 'fa-spin 2s infinite linear !important'} : {}}></i>
                    {message}
                </div>
            );
        });

        const PreviewModal = React.memo(({ previewData, onClose, onNavigate }) => {
            const[isMediaLoading, setIsMediaLoading] = useState(true);

            useEffect(() => {
                if (previewData.items.length > 0) { document.body.style.overflow = 'hidden'; setIsMediaLoading(true); } 
                else { document.body.style.overflow = 'auto'; }
                return () => { document.body.style.overflow = 'auto'; };
            },[previewData]);

            if (previewData.items.length === 0) return null;
            const currentItem = previewData.items[previewData.index];
            if (!currentItem || !currentItem.url) return null;
            
            const isPdf = currentItem.url.toLowerCase().includes('.pdf');
            const isVid = isVideoUrl(currentItem.url);
            const pdfViewerUrl = `https://docs.google.com/gview?url=${encodeURIComponent(currentItem.url)}&embedded=true`;

            return (
                <div className="fixed inset-0 z-[9999] flex items-center justify-center bg-black/95 p-2 md:p-10">
                    <button onClick={onClose} className="absolute top-4 right-4 md:top-6 md:right-6 bg-red-600 text-white w-10 h-10 rounded-full flex items-center justify-center hover:bg-red-700 z-50 shadow-lg border-2 border-white"><i className="fa-solid fa-xmark text-xl"></i></button>
                    <div className="w-full h-full max-w-6xl bg-black rounded-xl overflow-hidden relative flex items-center justify-center shadow-2xl">
                        {isMediaLoading && (
                            <div className="absolute inset-0 flex flex-col items-center justify-center z-40 bg-black/50">
                                <i className="fa-solid fa-circle-notch fa-spin text-white text-4xl mb-2" style={{animation: 'fa-spin 2s infinite linear !important'}}></i>
                                <span className="text-white text-xs font-bold mt-2">جاري التحميل...</span>
                            </div>
                        )}
                        {isPdf ? <iframe onLoad={() => setIsMediaLoading(false)} src={pdfViewerUrl} className="w-full h-full border-0 bg-white relative z-30" title="PDF Preview"></iframe>
                        : isVid ? <video onLoadedData={() => setIsMediaLoading(false)} src={currentItem.url} controls autoPlay className="max-w-full max-h-full outline-none relative z-30" playsInline></video>
                        : <img onLoad={() => setIsMediaLoading(false)} src={currentItem.url} alt="Preview" className="max-w-full max-h-full object-contain relative z-30" decoding="async" />}
                        
                        {previewData.items.length > 1 && (
                            <>
                                <button onClick={(e) => { e.stopPropagation(); onNavigate('prev'); }} className="absolute left-4 top-1/2 -translate-y-1/2 bg-black/60 hover:bg-black/90 text-white w-10 h-10 md:w-12 md:h-12 rounded-full flex items-center justify-center z-50"><i className="fa-solid fa-chevron-left text-lg md:text-xl"></i></button>
                                <button onClick={(e) => { e.stopPropagation(); onNavigate('next'); }} className="absolute right-4 top-1/2 -translate-y-1/2 bg-black/60 hover:bg-black/90 text-white w-10 h-10 md:w-12 md:h-12 rounded-full flex items-center justify-center z-50"><i className="fa-solid fa-chevron-right text-lg md:text-xl"></i></button>
                            </>
                        )}
                    </div>
                </div>
            );
        });

        const AdSlot = React.memo(({ id }) => {
            const adRef = useRef(null);
            const[hasAd, setHasAd] = useState(false);
            useEffect(() => { if (adRef.current && adRef.current.innerHTML.trim() !== "") setHasAd(true); },[]);
            return <div ref={adRef} className={`ad-container w-full ${hasAd ? 'my-6 py-4 bg-gray-50 border' : 'h-0 overflow-hidden'}`}></div>;
        });

        const SectionView = React.memo(({ type, title, icon, data, hideYearFilter = false, showSystemFilter = false, onBack, onPreviewSingle, onRequestDownload, initialFilters, showToast, highlightedItemId }) => {
            const[filterYear, setFilterYear] = useState(initialFilters?.year || 'اختار الفرقة');
            const[filterSystem, setFilterSystem] = useState(initialFilters?.system || 'اختار النظام'); 
            const[visibleCount, setVisibleCount] = useState(6);
            
            const[openDropdown, setOpenDropdown] = useState(null);
            const dropdownRef = useRef(null);

            useEffect(() => {
                const handleClickOutside = (event) => {
                    if (dropdownRef.current && !dropdownRef.current.contains(event.target)) {
                        setOpenDropdown(null);
                    }
                };
                document.addEventListener("mousedown", handleClickOutside);
                return () => document.removeEventListener("mousedown", handleClickOutside);
            },[]);

            useEffect(() => {
                if(initialFilters?.year) setFilterYear(initialFilters.year);
                if(initialFilters?.system) setFilterSystem(initialFilters.system);
            }, [initialFilters]);

            const years = type === 'training' ?['اختار الفرقة', 'الفرقة الأولى', 'الفرقة الثانية', 'الفرقة الثالثة', 'الفرقة الرابعة', 'كل الفرق'] :['اختار الفرقة', 'الفرقة الأولى', 'الفرقة الثانية', 'الفرقة الثالثة', 'الفرقة الرابعة'];
            const systems =['اختار النظام', 'انتظام', 'انتساب'];

            const filtered = useMemo(() => {
                return data.filter(item => {
                    const matchYear = hideYearFilter || filterYear === 'اختار الفرقة' || item.year === filterYear || item.year === 'كل الفرق' || item.year === 'عام';
                    const itemSystem = item.studySystem || 'عام';
                    const matchSystem = !showSystemFilter || filterSystem === 'اختار النظام' || itemSystem === 'عام' || itemSystem === filterSystem;
                    return matchYear && matchSystem;
                });
            },[data, filterYear, filterSystem, hideYearFilter, showSystemFilter]);

            useEffect(() => {
                if(highlightedItemId) {
                    const itemIndex = filtered.findIndex(i => toNumericId(i.id) === highlightedItemId);
                    if(itemIndex >= visibleCount) setVisibleCount(itemIndex + 12);
                }
            },[highlightedItemId, filtered]);

            const visibleData = filtered.slice(0, visibleCount);
            const isA4Card = type === 'lectures' || type === 'notes' || type === 'reviews' || type === 'guide';
            const isActivities = type === 'activities';
            const thumbType = isA4Card ? 'a4' : 'default';

            const formatWhatsApp = (phone) => {
                if(!phone) return '';
                let cleanPhone = phone.replace(/\D/g, '');
                if(cleanPhone.startsWith('0')) cleanPhone = '2' + cleanPhone;
                return `https://wa.me/${cleanPhone}`;
            };

            const formatDate = (timestamp) => {
                if (!timestamp) return '';
                const d = new Date(timestamp);
                return `${d.getDate()}/${d.getMonth()+1}/${d.getFullYear()}`;
            };

            const handleShareCard = async (e, item) => {
                e.stopPropagation();
                try {
                    const baseUrl = getCleanBaseUrl();
                    const shareUrl = `${baseUrl}?p=${type}&i=${toNumericId(item.id)}`;
                    
                    if (navigator.share) await navigator.share({ title: item.title, text: `شاهد: ${item.title}`, url: shareUrl });
                    else { await navigator.clipboard.writeText(shareUrl); showToast("تم نسخ رابط الملف المصغر", "success"); }
                } catch (err) { console.error(err); }
            };

            // تعديل روابط المشاركة للقسم لتكون قصيرة
            const handleShareSection = async (e) => {
                e.stopPropagation();
                try {
                    const baseUrl = getCleanBaseUrl();
                    const params = new URLSearchParams();
                    params.set('p', type);
                    
                    const getYearCode = (y) => {
                        if(y === 'الفرقة الأولى') return '1';
                        if(y === 'الفرقة الثانية') return '2';
                        if(y === 'الفرقة الثالثة') return '3';
                        if(y === 'الفرقة الرابعة') return '4';
                        if(y === 'كل الفرق') return 'all';
                        return '';
                    };
                    
                    const getSystemCode = (s) => {
                        if(s === 'انتظام') return 'r';
                        if(s === 'انتساب') return 'a';
                        return '';
                    };

                    if (!hideYearFilter && filterYear !== 'اختار الفرقة') {
                        const yCode = getYearCode(filterYear);
                        if(yCode) params.set('y', yCode);
                    }
                    if (showSystemFilter && filterSystem !== 'اختار النظام') {
                        const sCode = getSystemCode(filterSystem);
                        if(sCode) params.set('s', sCode);
                    }
                    
                    const shareUrl = `${baseUrl}?${params.toString()}`;
                    
                    if (navigator.share) await navigator.share({ title: title, text: `تصفح ${title} - كلية التجارة`, url: shareUrl });
                    else { await navigator.clipboard.writeText(shareUrl); showToast("تم نسخ رابط القسم بالفلاتر", "success"); }
                } catch (err) { console.error(err); }
            };

            let gridClass = isActivities ? "columns-2 md:columns-3 gap-3 space-y-3" : "grid gap-3 md:gap-4 grid-cols-1 sm:grid-cols-2 lg:grid-cols-3";

            return (
                <div className="bg-soft-white p-3 md:p-4 rounded-xl shadow-sm border border-blue-900/10">
                    <div className="flex flex-nowrap items-center justify-between mb-3 border-b border-gray-100 pb-2 gap-1.5 overflow-x-visible hide-scrollbar relative">
                        <div className="flex items-center gap-1.5 flex-shrink-0">
                            <button onClick={onBack} className="text-gray-500 hover:text-blue-900 bg-gray-100 hover:bg-gray-200 w-6 h-6 md:w-7 md:h-7 rounded-full flex items-center justify-center flex-shrink-0"><i className="fa-solid fa-arrow-right text-[10px]"></i></button>
                            <div className="text-blue-900 text-xs hidden sm:block"><i className={`fa-solid ${icon}`}></i></div>
                            <h2 className="text-xs md:text-sm font-black text-gray-800 whitespace-nowrap">{title}</h2>
                        </div>
                        
                        <div className="flex items-center gap-1.5 flex-shrink-0" ref={dropdownRef}>
                            <button onClick={handleShareSection} className="bg-yellow-100 hover:bg-yellow-200 text-yellow-700 border border-yellow-200 w-6 h-6 md:w-7 md:h-7 rounded-md flex items-center justify-center flex-shrink-0 shadow-sm transition-colors" title="مشاركة القسم">
                                <i className="fa-solid fa-share-nodes text-[10px] md:text-xs"></i>
                            </button>
                            
                            {(!hideYearFilter || showSystemFilter) && (
                                <>
                                    {!hideYearFilter && (
                                        <div className="relative">
                                            <button 
                                                onClick={() => setOpenDropdown(openDropdown === 'year' ? null : 'year')}
                                                className="flex items-center gap-1.5 bg-blue-900 text-white text-[9px] md:text-[10px] font-bold rounded-md px-2.5 py-1.5 outline-none cursor-pointer shadow-sm border border-blue-800 transition-colors hover:bg-blue-800"
                                            >
                                                {filterYear}
                                                <i className={`fa-solid fa-chevron-down text-[8px] transition-transform duration-200 ${openDropdown === 'year' ? 'rotate-180' : ''}`}></i>
                                            </button>
                                            
                                            {openDropdown === 'year' && (
                                                <div className="absolute top-full mt-1 right-0 w-32 bg-white rounded-lg shadow-xl border border-gray-100 z-50 overflow-hidden animate-[fadeIn_0.2s_ease-out]" style={{animation: 'fadeIn 0.2s ease-out'}}>
                                                    {years.map(y => (
                                                        <div 
                                                            key={y} 
                                                            onClick={() => { setFilterYear(y); setVisibleCount(6); setOpenDropdown(null); }} 
                                                            className={`px-3 py-2 text-[10px] font-bold cursor-pointer transition-colors border-b border-gray-50 last:border-0 ${filterYear === y ? 'bg-blue-50 text-blue-900' : 'text-gray-700 hover:bg-gray-50'}`}
                                                        >
                                                            {y}
                                                        </div>
                                                    ))}
                                                </div>
                                            )}
                                        </div>
                                    )}
                                    {showSystemFilter && (
                                        <div className="relative">
                                            <button 
                                                onClick={() => setOpenDropdown(openDropdown === 'system' ? null : 'system')}
                                                className="flex items-center gap-1.5 bg-blue-900 text-white text-[9px] md:text-[10px] font-bold rounded-md px-2.5 py-1.5 outline-none cursor-pointer shadow-sm border border-blue-800 transition-colors hover:bg-blue-800"
                                            >
                                                {filterSystem}
                                                <i className={`fa-solid fa-chevron-down text-[8px] transition-transform duration-200 ${openDropdown === 'system' ? 'rotate-180' : ''}`}></i>
                                            </button>
                                            
                                            {openDropdown === 'system' && (
                                                <div className="absolute top-full mt-1 left-0 right-auto md:right-0 md:left-auto w-28 bg-white rounded-lg shadow-xl border border-gray-100 z-50 overflow-hidden animate-[fadeIn_0.2s_ease-out]" style={{animation: 'fadeIn 0.2s ease-out'}}>
                                                    {systems.map(s => (
                                                        <div 
                                                            key={s} 
                                                            onClick={() => { setFilterSystem(s); setVisibleCount(6); setOpenDropdown(null); }} 
                                                            className={`px-3 py-2 text-[10px] font-bold cursor-pointer transition-colors border-b border-gray-50 last:border-0 ${filterSystem === s ? 'bg-blue-50 text-blue-900' : 'text-gray-700 hover:bg-gray-50'}`}
                                                        >
                                                            {s}
                                                        </div>
                                                    ))}
                                                </div>
                                            )}
                                        </div>
                                    )}
                                </>
                            )}
                        </div>
                    </div>
                    
                    <div className={gridClass}>
                        {visibleData.length === 0 ? <div className="col-span-full text-center py-12 text-gray-400 text-sm font-bold">لا توجد بيانات متاحة حالياً.</div> : visibleData.map(item => {
                            const isVid = isVideoUrl(item.fileUrl);
                            const numericId = toNumericId(item.id);
                            
                            if (isActivities) {
                                return (
                                    <div key={item.id} id={`card-${numericId}`} className="optimized-card break-inside-avoid relative rounded-xl overflow-hidden cursor-pointer shadow-sm border border-gray-200 bg-black group" onClick={() => onPreviewSingle(item.fileUrl)}>
                                        {isVid && <div className="absolute inset-0 flex items-center justify-center z-20 pointer-events-none"><div className="w-10 h-10 bg-black/60 rounded-full flex items-center justify-center text-white border-2 border-white/50"><i className="fa-solid fa-play ml-1 text-sm"></i></div></div>}
                                        <button onClick={(e) => handleShareCard(e, item)} className="absolute top-2 left-2 w-8 h-8 bg-black/50 text-white rounded-full flex items-center justify-center z-30 opacity-0 group-hover:opacity-100 border border-white/20"><i className="fa-solid fa-share-nodes text-xs"></i></button>
                                        <img src={getThumbnail(item.fileUrl, 'default')} alt={item.title} loading="lazy" decoding="async" className="w-full h-auto object-cover opacity-90" />
                                        <div className="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-black/90 to-transparent p-3 pt-8 text-white z-10 pointer-events-none"><h4 className="font-bold text-[11px] md:text-xs leading-tight drop-shadow-lg line-clamp-2">{item.title}</h4></div>
                                    </div>
                                );
                            }
                            return (
                                <div key={item.id} id={`card-${numericId}`} className="optimized-card flex flex-row sm:flex-col gap-3 p-2.5 border border-blue-900/10 rounded-xl bg-white relative overflow-hidden">
                                    <div className={`relative flex-shrink-0 rounded-lg overflow-hidden bg-gray-100 border border-gray-200 cursor-pointer flex items-center justify-center ${isA4Card ? 'w-20 h-28 sm:w-full sm:h-48' : 'w-24 h-24 sm:w-full sm:h-40'}`} onClick={() => onPreviewSingle(item.fileUrl)}>
                                        <img src={getThumbnail(item.fileUrl, thumbType)} alt={item.title} loading="lazy" decoding="async" className="w-full h-full object-cover" />

                                                </>

                                            {item.link && <a href={item.link} target="_blank" className="flex-1 bg-red-50 text-red-700 text-[10px] py-1.5 rounded-lg font-bold text-center truncate border border-red-100 transition hover:bg-red-100"><i className="fa-brands fa-youtube"></i> رابط</a>}
                                            {item.phone && (

                                                    <a href={`tel:${item.phone}`} className="w-8 bg-gray-800 text-white text-[10px] py-1.5 rounded-lg font-bold text-center flex items-center justify-center transition hover:bg-gray-900"><i className="fa-solid fa-phone"></i></a>
                                                    <button onClick={(e) => handleShareCard(e, item)} className="w-8 flex-none bg-purple-50 text-purple-700 py-1.5 rounded-lg font-bold flex items-center justify-center border border-purple-100 transition hover:bg-purple-100"><i className="fa-solid fa-share-nodes"></i></button>
                                                </>
                                            )}
                                        </div>
                                    </div>

                            );

                    </div>
                    {visibleCount < filtered.length && (
                        <div className="text-center mt-5">

                        </div>
                    )}
                </div>
            );
        });

        const HomeSlider = React.memo(({ schedules, onPreviewSlider }) => {
            const[idx, setIdx] = useState(0);
            if (!schedules || schedules.length === 0) {
                return (
                    <div className="relative w-full rounded-2xl md:rounded-3xl overflow-hidden shadow-sm border border-gray-200 bg-gray-100">
                        <div className="bg-blue-900 text-white text-center py-1.5 md:py-2 text-xs md:text-sm font-bold border-b border-yellow-500 min-h-[28px] md:min-h-[36px]">{"\u00A0"}</div>
                        <div className="h-40 md:h-72 relative overflow-hidden flex items-center justify-center">
                            <div className="absolute left-2 top-1/2 -translate-y-1/2 bg-black/40 text-white w-7 h-7 rounded-full z-20 flex items-center justify-center opacity-50"><i className="fa-solid fa-chevron-left text-xs"></i></div>
                            <div className="absolute right-2 top-1/2 -translate-y-1/2 bg-black/40 text-white w-7 h-7 rounded-full z-20 flex items-center justify-center opacity-50"><i className="fa-solid fa-chevron-right text-xs"></i></div>
                        </div>
                        <div className="flex justify-center gap-1 py-1.5 bg-gray-50 border-t border-gray-100"><div className="h-1 rounded-full w-5 bg-blue-900/30"></div><div className="h-1 rounded-full w-1.5 bg-gray-300"></div></div>

            return (
                <div className="relative w-full rounded-2xl md:rounded-3xl overflow-hidden shadow-sm border border-gray-200 group bg-gray-100">
                    <div className="bg-blue-900 text-white text-center py-1.5 md:py-2 text-xs md:text-sm font-bold border-b border-yellow-500 min-h-[28px] md:min-h-[36px]">{schedules[idx].title || 'جداول المحاضرات الرسمية'}</div>
                    <div className="h-40 md:h-72 relative cursor-pointer overflow-hidden flex items-center justify-center" onClick={() => onPreviewSlider(schedules, idx)}>
                        <img src={getThumbnail(schedules[idx].url, 'slider')} className="w-full h-full object-contain scale-[1.02]" decoding="sync" fetchpriority={idx === 0 ? "high" : "auto"} loading={idx === 0 ? "eager" : "lazy"} alt={schedules[idx].title || "جدول"} />
                        {schedules.length > 1 && (
                            <>
                                <button onClick={(e) => { e.preventDefault(); e.stopPropagation(); setIdx(i => (i-1+schedules.length)%schedules.length); }} className="absolute left-2 top-1/2 -translate-y-1/2 bg-black/40 text-white w-7 h-7 rounded-full z-20 flex items-center justify-center"><i className="fa-solid fa-chevron-left text-xs"></i></button>
                                <button onClick={(e) => { e.preventDefault(); e.stopPropagation(); setIdx(i => (i+1)%schedules.length); }} className="absolute right-2 top-1/2 -translate-y-1/2 bg-black/40 text-white w-7 h-7 rounded-full z-20 flex items-center justify-center"><i className="fa-solid fa-chevron-right text-xs"></i></button>
                            </>
                        )}
                    </div>
                    {schedules.length > 1 && <div className="flex justify-center gap-1 py-1.5 bg-gray-50 border-t border-gray-100">{schedules.map((_, i) => <div key={i} className={`h-1 rounded-full ${i === idx ? 'w-5 bg-blue-900' : 'w-1.5 bg-gray-300'}`}></div>)}</div>}
                </div>
            );

        const SidebarBtn = React.memo(({ icon, label, active, onClick, color="text-gray-700" }) => (
            <button onClick={onClick} className={`flex items-center gap-2 w-full p-2.5 rounded-lg font-bold text-[11px] md:text-xs border-r-4 ${active ? 'bg-blue-50 text-blue-900 border-blue-900' : `border-transparent ${color}`}`}>
                <div className="w-5 flex justify-center"><i className={`fa-solid ${icon} text-sm md:text-base`}></i></div><span className="text-right flex-1">{label}</span>
            </button>
        ));

        const HomeCard = React.memo(({ icon, label, color, onClick }) => (
            <div onClick={onClick} className={`${color} p-3 md:p-4 rounded-xl text-white flex flex-col items-center justify-center gap-1.5 shadow-sm cursor-pointer border border-white/20`}>
                <i className={`fa-solid ${icon} text-xl md:text-2xl`}></i><span className="font-bold text-[10px] md:text-xs">{label}</span>
            </div>

                    <button onClick={onBack} className="text-gray-500 bg-gray-100 w-7 h-7 rounded-full flex items-center justify-center flex-shrink-0 border border-gray-200"><i className="fa-solid fa-arrow-right text-xs"></i></button>
                    <h2 className="text-lg md:text-xl font-bold text-blue-900">من نحن؟</h2>
                </div>
                <p className="mb-3 text-sm font-bold text-gray-700">موقع كلية التجارة جامعة الزقازيق هو مبادرة طلابية تهدف إلى توفير كافة المصادر التعليمية من محاضرات ومذكرات بشكل منظم وسهل الوصول.</p>
                <p className="mb-3 text-sm font-bold text-gray-700">تم بناء هذا الموقع لخدمة أكثر من 30 ألف طالب في الكلية، مع التركيز على تحديث المحتوى يومياً.</p>
                <div className="bg-blue-50 p-3 rounded-lg border border-blue-100 shadow-sm mt-5"><p className="text-xs font-black text-blue-900 text-center"><i className="fa-solid fa-code mr-1"></i> إشراف وتطوير: شهاب طارق صلاح</p></div>
                <h3 className="font-bold mt-6 mb-2 text-red-600 text-sm"><i className="fa-solid fa-shield-halved mr-1"></i> سياسة الخصوصية:</h3>
                <p className="text-[10px] md:text-xs text-gray-500 font-bold">نحن نحترم حقوق الملكية الفكرية، كافة الملفات المرفوعة هي ملخصات طلابية. إذا كنت تعتقد أن هناك محتوى ينتهك حقوقك يرجى مراسلتنا فوراً.</p>
            </div>
        );

        const InternalBrowser = React.memo(({ isOpen, onClose, url, title }) => {
            const[iframeLoading, setIframeLoading] = useState(true);
            useEffect(() => { if (isOpen) setIframeLoading(true); }, [isOpen]);
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 z-[99999] bg-black flex flex-col">
                    <div className="bg-blue-950 text-white h-14 flex items-center justify-between px-4 shadow-md z-10 border-b border-blue-800">
                        <div className="flex items-center gap-2">
                            <div className="w-8 h-8 bg-white/10 rounded-full flex items-center justify-center"><i className="fa-solid fa-laptop-file text-blue-300 text-sm"></i></div>
                            <span className="font-bold text-sm md:text-base">{title}</span>
                        </div>
                        <div className="flex items-center gap-3">
                            <button onClick={() => window.open(url, '_blank')} className="text-blue-300 hover:text-white text-[10px] md:text-xs flex items-center gap-1 bg-white/5 px-2 py-1.5 rounded-lg border border-blue-800"><i className="fa-solid fa-arrow-up-right-from-square"></i> فتح بالمتصفح</button>
                            <button onClick={onClose} className="bg-red-600 text-white w-8 h-8 rounded-full flex items-center justify-center shadow-lg border border-red-500"><i className="fa-solid fa-xmark text-lg"></i></button>
                        </div>
                    </div>
                    <div className="flex-1 w-full bg-gray-100 relative overflow-hidden">
                        {iframeLoading && (
                            <div className="absolute inset-0 flex flex-col items-center justify-center z-0">
                                <i className="fa-solid fa-circle-notch fa-spin text-blue-900 text-3xl mb-2" style={{animation: 'fa-spin 2s infinite linear !important'}}></i>
                                <span className="text-blue-900 font-bold text-xs mt-2">جاري تحميل الخدمات...</span>
                            </div>
                        )}
                        <iframe onLoad={() => setIframeLoading(false)} src={url} className="w-full h-full border-0 absolute inset-0 z-10 bg-white" title={title} sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-popups-to-escape-sandbox allow-top-navigation-by-user-activation"></iframe>
                    </div>
                </div>
            );
        });

        const App = () => {
            const[page, setPage] = useState('home');
            const[initialFilters, setInitialFilters] = useState({ year: 'اختار الفرقة', system: 'اختار النظام' });
            const[highlightedItemId, setHighlightedItemId] = useState(null);
            
            const[materials, setMaterials] = useState(() => {
                const cached = localStorage.getItem('foc_materials_cache');
                return cached ? JSON.parse(cached) :[];
            });
            const[schedules, setSchedules] = useState(() => {
                const cached = localStorage.getItem('foc_schedules_cache');
                return cached ? JSON.parse(cached) :[];
            });
            
            const[isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
            const[previewData, setPreviewData] = useState({ items:[], index: -1 });
            const[downloadItem, setDownloadItem] = useState(null); 
            const[toast, setToast] = useState({ message: '', type: '' });
            const[externalSiteOpen, setExternalSiteOpen] = useState(false);

            const scrollPositions = useRef({});
            const currentPageRef = useRef(page);

            useEffect(() => { currentPageRef.current = page; },[page]);

            const showToast = useCallback((message, type = 'info', duration = 2500) => {
                setToast({ message, type });
                if (duration) setTimeout(() => setToast({ message: '', type: '' }), duration);
            },[]);

            const openSinglePreview = useCallback((url) => { if(url) setPreviewData({ items: [{ url }], index: 0 }); },[]);
            const openSliderPreview = useCallback((schedulesArray, clickedIndex) => {
                const items = schedulesArray.map(s => ({ url: s.url }));
                setPreviewData({ items, index: clickedIndex });
            },[]);

            const handleModalNavigate = useCallback((direction) => {
                setPreviewData(prev => {
                    let newIdx = prev.index;
                    if(direction === 'next') newIdx = (prev.index + 1) % prev.items.length;
                    if(direction === 'prev') newIdx = (prev.index - 1 + prev.items.length) % prev.items.length;
                    return { ...prev, index: newIdx };
                });
            },[]);

            const handleCleanSite = () => { localStorage.clear(); sessionStorage.clear(); window.location.reload(true); };

            const handleRequestDownload = useCallback((url, title) => { setDownloadItem({ url, title }); },[]);

            const executeDownload = async () => {
                if (!downloadItem) return;
                const { url, title } = downloadItem;
                setDownloadItem(null);
                showToast("جاري تجهيز الملف...", "info", 2000);

                try {
                    const dlUrl = url.includes('cloudinary.com') ? url.replace('/upload/', '/upload/fl_attachment/') : url;
                    const response = await fetch(dlUrl);
                    if (!response.ok) throw new Error('Network error');
                    const blob = await response.blob();
                    const blobUrl = window.URL.createObjectURL(blob);
                    const link = document.createElement('a');
                    link.href = blobUrl;
                    let ext = 'pdf'; 
                    if (url.includes('.')) { const parts = url.split('.'); ext = parts[parts.length - 1].split('?')[0].split('#')[0]; }
                    link.download = `${title}.${ext}`;
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    window.URL.revokeObjectURL(blobUrl);
                    showToast("بدأ التحميل بنجاح", "success");
                } catch (error) {
                    const dlUrl = url.includes('cloudinary.com') ? url.replace('/upload/', '/upload/fl_attachment/') : url;
                    const link = document.createElement('a');
                    link.href = dlUrl;
                    link.download = title;
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                }
            };

        // تنفيذ فوري لضمان سرعة الاستجابة اللحظية
            const navigate = useCallback((pg) => {
                try {
                    setIsMobileMenuOpen(false); setHighlightedItemId(null);
                    if (currentPageRef.current) scrollPositions.current[currentPageRef.current] = window.scrollY;
                    
                    const url = new URL(getCleanBaseUrl());
                    url.searchParams.set('p', pg); 
                    window.history.pushState({ page: pg }, '', url.toString());
                    
                    setPage(pg);
                    // تنفيذ فوري بدون تأخير
                    window.scrollTo({ top: 0, behavior: 'instant' }); 
                } catch (err) { setPage(pg); window.scrollTo(0, 0); }
            },[]);

            const goBack = useCallback(() => {
                try {
                    if (currentPageRef.current) scrollPositions.current[currentPageRef.current] = window.scrollY;
                    const url = new URL(getCleanBaseUrl());
                    window.history.pushState({ page: 'home' }, '', url.toString());
                    setPage('home');
                    // استعادة مكان التمرير السابق فوراً
                    const topPos = scrollPositions.current['home'] || 0;
                    window.scrollTo({ top: topPos, behavior: 'instant' });
                } catch (err) { navigate('home'); }
            }, [navigate]);

            useEffect(() => {
                const welcomeTimer = setTimeout(() => showToast("أهلاً بكم في منصتي التعليمية", "success", 3000), 1500);
                try {
                    const params = new URLSearchParams(window.location.search);
                    const pageParam = params.get('page') || params.get('p');
                    const itemParam = params.get('item') || params.get('i');

                    const resolveYear = (val) => {
                        if(!val) return 'اختار الفرقة';
                        if(val === '1') return 'الفرقة الأولى'; if(val === '2') return 'الفرقة الثانية'; if(val === '3') return 'الفرقة الثالثة'; if(val === '4') return 'الفرقة الرابعة'; if(val === 'all') return 'كل الفرق';
                        if(val.includes('الفرقة') || val === 'كل الفرق') return val; return 'اختار الفرقة';
                    };
                    const resolveSystem = (val) => {
                        if(!val) return 'اختار النظام';
                        if(val === 'r') return 'انتظام'; if(val === 'a') return 'انتساب';
                        if(val === 'انتظام' || val === 'انتساب') return val; return 'اختار النظام';
                    };

                    if (pageParam) {
                        setPage(pageParam);
                        setInitialFilters({ year: resolveYear(params.get('y') || params.get('year')), system: resolveSystem(params.get('s') || params.get('system')) });
                        if(itemParam) {
                            setHighlightedItemId(itemParam);
                        }
                        
                        const cleanUrl = getCleanBaseUrl() + window.location.search;
                        window.history.replaceState({ page: pageParam }, document.title, cleanUrl);
                    } else { window.history.replaceState({ page: 'home' }, document.title, getCleanBaseUrl()); }
                } catch (err) { console.error("Init Error:", err); }

                const qMat = query(collection(db, 'materials'), orderBy('createdAt', 'desc'), limit(150));
                const unsubMat = onSnapshot(qMat, { includeMetadataChanges: true }, (snap) => {
                    const data = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    setMaterials(data);
                    localStorage.setItem('foc_materials_cache', JSON.stringify(data));
                });
                
                const unsubSch = onSnapshot(collection(db, 'schedules'), { includeMetadataChanges: true }, (snap) => {
                    const data = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    setSchedules(data);
                    localStorage.setItem('foc_schedules_cache', JSON.stringify(data));
                });

                return () => { unsubMat(); unsubSch(); clearTimeout(welcomeTimer); };
            },[]);

            // منع تكرار تحديد العنصر مرتين (Double Highlight Fix)
            useEffect(() => {
                if (highlightedItemId && materials.length > 0) {
                    const item = materials.find(m => toNumericId(m.id) === highlightedItemId);
                    if (item) {
                        setInitialFilters({
                            year: item.year || 'اختار الفرقة',
                            system: item.studySystem || 'اختار النظام'
                        });
                        
                        setTimeout(() => {
                            const el = document.getElementById(`card-${highlightedItemId}`);
                            if(el && !el.classList.contains('card-highlight')) {
                                const y = el.getBoundingClientRect().top + window.scrollY - 100;
                                window.scrollTo({ top: y, behavior: 'smooth' });
                                
                                el.classList.add('card-highlight');
                                setTimeout(() => {
                                    el.classList.remove('card-highlight');
                                    setHighlightedItemId(null); // يمسح المتغير عشان ميتكررش
                                }, 3100);
                            }
                        }, 500);
                    }
                }
            }, [materials, highlightedItemId]);

            useEffect(() => {
                const handlePopState = (e) => {
                    try {
                        const params = new URLSearchParams(window.location.search);
                        const pg = params.get('p') || params.get('page') || 'home';
                        if (currentPageRef.current) scrollPositions.current[currentPageRef.current] = window.scrollY;
                        setPage(pg);
                        setTimeout(() => { const topPos = scrollPositions.current[pg] !== undefined ? scrollPositions.current[pg] : 0; window.scrollTo({ top: topPos, behavior: 'instant' }); }, 50);
                    } catch (err) {}
                };
                window.addEventListener('popstate', handlePopState);
                return () => window.removeEventListener('popstate', handlePopState);
            },[]);

            const getByType = useCallback((type) => materials.filter(m => m.sectionType === type),[materials]);

            return (
                <div className="min-h-screen flex flex-col relative">
                    <Toast message={toast.message} type={toast.type} />
                    <PreviewModal previewData={previewData} onClose={() => setPreviewData({ items:[], index: -1 })} onNavigate={handleModalNavigate} />
                    <InternalBrowser isOpen={externalSiteOpen} onClose={() => setExternalSiteOpen(false)} url="https://faculty-of-commerce.netlify.app/" title="خدمات الطلاب" />

                    {downloadItem && (
                        <div className="fixed inset-0 z-[9999] bg-black/60 flex items-center justify-center p-4">
                            <div className="bg-soft-white rounded-2xl p-6 max-w-sm w-full shadow-2xl text-center">
                                <div className="w-14 h-14 bg-blue-50 rounded-full flex items-center justify-center mx-auto mb-4 text-blue-600 text-2xl border border-blue-200"><i className="fa-solid fa-cloud-arrow-down"></i></div>

                                <p className="text-gray-500 mb-5 text-xs font-bold leading-relaxed">{downloadItem.title}</p>
                                <div className="flex gap-2">
                                    <button onClick={executeDownload} className="flex-1 bg-blue-600 text-white py-2 rounded-lg text-xs font-bold">موافق، تحميل</button>
                                    <button onClick={() => setDownloadItem(null)} className="flex-1 bg-gray-200 text-gray-800 py-2 rounded-lg text-xs font-bold">إلغاء</button>
                                </div>
                            </div>
                        </div>
                    )}

                    <nav className="bg-blue-900 text-white sticky top-0 z-40 shadow-lg border-b-2 border-yellow-500">
                        <div className="w-full px-4 lg:px-8 flex justify-between items-center h-14 md:h-16">
                            <div className="flex items-center gap-2 cursor-pointer" onClick={() => navigate('home')}>
                                <div className="w-8 h-8 md:w-10 md:h-10 bg-white rounded-full flex items-center justify-center text-blue-900 shadow-inner"><i className="fa-solid fa-graduation-cap text-sm md:text-lg"></i></div>
                                <span className="font-black text-base md:text-xl tracking-tighter">تجارة الزقازيق</span>
                            </div>
                            <div className="hidden lg:flex items-center gap-1 text-xs md:text-sm">
                                <button onClick={() => navigate('home')} className={`px-3 py-4 md:py-5 ${page === 'home' ? 'nav-link-active' : ''}`}>الرئيسية</button>
                                <button onClick={() => navigate('lectures')} className={`px-3 py-4 md:py-5 ${page === 'lectures' ? 'nav-link-active' : ''}`}>المحاضرات</button>
                                <button onClick={() => navigate('notes')} className={`px-3 py-4 md:py-5 ${page === 'notes' ? 'nav-link-active' : ''}`}>المذكرات</button>
                                <button onClick={() => navigate('reviews')} className={`px-3 py-4 md:py-5 ${page === 'reviews' ? 'nav-link-active' : ''}`}>المراجعات</button>
                                <button onClick={() => navigate('activities')} className={`px-3 py-4 md:py-5 ${page === 'activities' ? 'nav-link-active' : ''}`}>الأنشطة</button>
                                <button onClick={() => navigate('training')} className={`px-3 py-4 md:py-5 ${page === 'training' ? 'nav-link-active' : ''}`}>التدريب</button>
                                <button onClick={() => navigate('jobs')} className={`px-3 py-4 md:py-5 ${page === 'jobs' ? 'nav-link-active' : ''}`}>الوظائف</button>
                            </div>
                            <button className="lg:hidden text-xl p-2" onClick={() => setIsMobileMenuOpen(true)}><i className="fa-solid fa-bars"></i></button>
                        </div>
                    </nav>

                    <div className={`fixed inset-0 bg-black/50 z-[100] lg:hidden ${isMobileMenuOpen ? 'block' : 'hidden'}`} onClick={() => setIsMobileMenuOpen(false)}></div>

                    <div className={`fixed top-0 right-0 max-h-[100dvh] h-fit pb-3 rounded-bl-3xl w-56 md:w-64 bg-soft-white z-[101] shadow-2xl lg:hidden flex flex-col ${isMobileMenuOpen ? 'block' : 'hidden'}`}>
                        <div className="bg-blue-900 text-white p-3 md:p-4 flex justify-between items-center border-b-2 border-yellow-500 rounded-bl-sm">
                            <span className="font-bold text-sm md:text-base">القائمة</span>
                            <button onClick={() => setIsMobileMenuOpen(false)} className="text-lg md:text-xl"><i className="fa-solid fa-xmark"></i></button>
                        </div>
                        <div className="flex flex-col p-3 gap-1.5 overflow-y-auto sidebar-scroll">
                            <SidebarBtn icon="fa-house" label="الرئيسية" active={page==='home'} onClick={() => navigate('home')} />
                            <SidebarBtn icon="fa-person-chalkboard" label="المحاضرات" active={page==='lectures'} onClick={() => navigate('lectures')} />
                            <SidebarBtn icon="fa-book" label="المذكرات" active={page==='notes'} onClick={() => navigate('notes')} />
                            <SidebarBtn icon="fa-file-shield" label="المراجعات" active={page==='reviews'} onClick={() => navigate('reviews')} />
                            <SidebarBtn icon="fa-users-gear" label="الأنشطة العامة" active={page==='activities'} onClick={() => navigate('activities')} />
                            <SidebarBtn icon="fa-graduation-cap" label="التدريب والكورسات" active={page==='training'} onClick={() => navigate('training')} />
                            <SidebarBtn icon="fa-briefcase" label="الوظائف" active={page==='jobs'} onClick={() => navigate('jobs')} />
                            <SidebarBtn icon="fa-map-location" label="دليل الطالب" active={page==='guide'} onClick={() => navigate('guide')} />
                            <SidebarBtn icon="fa-circle-info" label="من نحن" active={page==='about'} onClick={() => navigate('about')} />
                            <hr className="my-1 border-gray-200 w-full" />
                            <button onClick={handleCleanSite} className="flex items-center justify-center gap-1.5 w-full p-2 rounded-lg font-black text-[10px] md:text-xs bg-gradient-to-r from-emerald-400 to-teal-500 text-white shadow-sm mt-1 border border-teal-600"><i className="fa-solid fa-broom"></i> تنظيف الموقع</button>
                        </div>
                    </div>

                    <main className="flex-grow container mx-auto px-3 md:px-4 py-4 md:py-6 max-w-5xl relative">
                        <AdSlot id="top-ad" />
                        {page === 'home' && (
                            <div className="space-y-6 md:space-y-8">
                                <div className="relative rounded-2xl md:rounded-3xl overflow-hidden h-48 md:h-56 shadow-lg">
                                    <img src="https://res.cloudinary.com/dsxrjmcxs/image/upload/c_fill,g_auto,w_1364,h_768,q_auto:eco,f_auto/v1776437104/sm5iuilfl3r1fkmg7jyh.png" className="w-full h-full object-cover" alt="الكلية" fetchpriority="high" decoding="sync" />
                                    <div className="absolute inset-0 bg-gradient-to-r from-blue-950/85 via-blue-900/45 to-transparent flex flex-col justify-center items-center text-center px-6 md:px-8 text-white">
                                        <h2 className="text-2xl md:text-3xl font-black mb-1 md:mb-2 drop-shadow-lg">بوابة كلية التجارة</h2>
                                        <p className="opacity-90 font-bold text-xs md:text-sm drop-shadow-md">جامعة الزقازيق - شهاب طارق صلاح</p>
                                    </div>
                                </div>
                                <HomeSlider schedules={schedules} onPreviewSlider={openSliderPreview} />
                                <div className="grid grid-cols-2 md:grid-cols-4 gap-3 md:gap-4">
                                    <div onClick={() => setExternalSiteOpen(true)} className="col-span-2 md:col-span-2 bg-gradient-to-r from-blue-800 to-indigo-900 p-3 md:p-4 rounded-xl text-white flex items-center gap-3 shadow-md cursor-pointer border border-blue-400/30">
                                        <div className="w-10 h-10 md:w-12 md:h-12 bg-white rounded-full flex items-center justify-center text-blue-900 shadow-inner flex-shrink-0"><i className="fa-solid fa-graduation-cap text-lg md:text-xl"></i></div>
                                        <div className="flex flex-col justify-center"><h3 className="font-black text-xs md:text-sm drop-shadow-md leading-tight mb-1">موقع خدمات طلاب كلية تجارة الزقازيق</h3><p className="text-[9px] md:text-[11px] text-blue-200 font-bold bg-black/20 w-fit px-2 py-0.5 rounded-full">اضغط لفتح الموقع</p></div>
                                    </div>
                                    <HomeCard icon="fa-person-chalkboard" label="المحاضرات" color="bg-blue-600" onClick={() => navigate('lectures')} />
                                    <HomeCard icon="fa-book" label="المذكرات" color="bg-indigo-600" onClick={() => navigate('notes')} />
                                    <HomeCard icon="fa-file-shield" label="المراجعات" color="bg-red-600" onClick={() => navigate('reviews')} />
                                    <HomeCard icon="fa-users-gear" label="الأنشطة" color="bg-green-600" onClick={() => navigate('activities')} />
                                    <HomeCard icon="fa-graduation-cap" label="التدريب" color="bg-orange-600" onClick={() => navigate('training')} />
                                    <HomeCard icon="fa-briefcase" label="الوظائف" color="bg-cyan-600" onClick={() => navigate('jobs')} />
                                    <HomeCard icon="fa-map-location" label="دليل الطالب" color="bg-gray-600" onClick={() => navigate('guide')} />
                                    <HomeCard icon="fa-circle-info" label="من نحن" color="bg-gray-600" onClick={() => navigate('about')} />
                                </div>
                            </div>
                        )}

                        {page === 'lectures' && <SectionView type="lectures" title="قسم المحاضرات" icon="fa-person-chalkboard" data={getByType('lectures')} showSystemFilter={true} onBack={goBack} onPreviewSingle={openSinglePreview} onRequestDownload={handleRequestDownload} initialFilters={initialFilters} showToast={showToast} highlightedItemId={highlightedItemId} />}
                        {page === 'notes' && <SectionView type="notes" title="قسم المذكرات" icon="fa-book" data={getByType('notes')} showSystemFilter={true} onBack={goBack} onPreviewSingle={openSinglePreview} onRequestDownload={handleRequestDownload} initialFilters={initialFilters} showToast={showToast} highlightedItemId={highlightedItemId} />}
                        {page === 'reviews' && <SectionView type="reviews" title="قسم المراجعات والامتحانات" icon="fa-file-shield" data={getByType('reviews')} showSystemFilter={true} onBack={goBack} onPreviewSingle={openSinglePreview} onRequestDownload={handleRequestDownload} initialFilters={initialFilters} showToast={showToast} highlightedItemId={highlightedItemId} />}
                        {page === 'activities' && <SectionView type="activities" title="معرض الأنشطة العام" icon="fa-users-gear" data={getByType('activities')} hideYearFilter={true} onBack={goBack} onPreviewSingle={openSinglePreview} onRequestDownload={handleRequestDownload} initialFilters={initialFilters} showToast={showToast} highlightedItemId={highlightedItemId} />}
                        {page === 'training' && <SectionView type="training" title="التدريب والكورسات" icon="fa-graduation-cap" data={getByType('training')} onBack={goBack} onPreviewSingle={openSinglePreview} onRequestDownload={handleRequestDownload} initialFilters={initialFilters} showToast={showToast} highlightedItemId={highlightedItemId} />}
                        {page === 'jobs' && <SectionView type="jobs" title="الوظائف المتاحة" icon="fa-briefcase" data={getByType('jobs')} hideYearFilter={true} onBack={goBack} onPreviewSingle={openSinglePreview} onRequestDownload={handleRequestDownload} initialFilters={initialFilters} showToast={showToast} highlightedItemId={highlightedItemId} />}
                        {page === 'guide' && <SectionView type="guide" title="دليل الطالب" icon="fa-map-location" data={getByType('guide')} showSystemFilter={true} onBack={goBack} onPreviewSingle={openSinglePreview} onRequestDownload={handleRequestDownload} initialFilters={initialFilters} showToast={showToast} highlightedItemId={highlightedItemId} />}
                        {page === 'about' && <AboutPage onBack={goBack} />}

                        <AdSlot id="bottom-ad" />
                    </main>

                    <div className="lg:hidden fixed bottom-0 w-full bg-soft-white border-t border-blue-900/10 flex text-blue-900 z-50 shadow-[0_-4px_15px_rgba(0,0,0,0.03)] rounded-t-xl overflow-hidden">
                        <button onClick={() => navigate('home')} className={`flex-1 flex flex-col items-center justify-center py-3 ${page === 'home' ? 'text-yellow-600 bg-blue-50/50' : 'text-blue-900'}`}><i className="fa-solid fa-house text-lg"></i><span className="text-[10px] mt-1 font-bold">الرئيسية</span></button>
                        <button onClick={() => navigate('lectures')} className={`flex-1 flex flex-col items-center justify-center py-3 ${page === 'lectures' ? 'text-yellow-600 bg-blue-50/50' : 'text-blue-900'}`}><i className="fa-solid fa-person-chalkboard text-lg"></i><span className="text-[10px] mt-1 font-bold">المحاضرات</span></button>
                        <button onClick={() => navigate('notes')} className={`flex-1 flex flex-col items-center justify-center py-3 ${page === 'notes' ? 'text-yellow-600 bg-blue-50/50' : 'text-blue-900'}`}><i className="fa-solid fa-book text-lg"></i><span className="text-[10px] mt-1 font-bold">المذكرات</span></button>
                        <button onClick={() => navigate('activities')} className={`flex-1 flex flex-col items-center justify-center py-3 ${page === 'activities' ? 'text-yellow-600 bg-blue-50/50' : 'text-blue-900'}`}><i className="fa-solid fa-users-gear text-lg"></i><span className="text-[10px] mt-1 font-bold">الأنشطة</span></button>
                    </div>

                    { (page === 'home' || page === 'about') && (
                        <footer className="bg-blue-950 text-white py-10 text-center mt-8 border-t-4 border-yellow-500">
                            <div className="container mx-auto px-4">
                                <div className="mb-5 flex justify-center gap-5 text-xl">
                                    <a href="https://www.facebook.com/share/1CFLABhk1T/" className="text-white"><i className="fa-brands fa-facebook"></i></a>
                                    <a href="https://www.instagram.com/shehab_tarek1?igsh=c282OXltYXNuazc0" className="text-white"><i className="fa-brands fa-instagram"></i></a>
                                    <a href="t.me/shehabt2022s" className="text-white"><i className="fa-brands fa-telegram"></i></a>
                                </div>
                                <p className="font-bold mb-1 text-sm">جميع الحقوق محفوظة &copy; {new Date().getFullYear()}</p>
                                <p className="text-xs opacity-60">تصميم وتطوير: شهاب طارق صلاح</p>
                            </div>
                        </footer>
                    )}
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
