<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كلية التجارة جامعة الزقازيق | الموقع الرسمي</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- مكتبة ضغط الصور في المتصفح -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/browser-image-compression@2.0.2/dist/browser-image-compression.js"></script>

    <script type="importmap">
        {
            "imports": {
                "react": "https://esm.sh/react@18.2.0",
                "react-dom/client": "https://esm.sh/react-dom@18.2.0/client"
            }
        }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap');
        body { font-family: 'Cairo', sans-serif; background-color: #f8fafc; overflow-x: hidden; }
        .ad-container:empty { display: none !important; }
        .nav-link-active { border-bottom: 3px solid #fbbf24; color: #fbbf24 !important; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        
        /* Custom Scrollbar */
        .sidebar-scroll::-webkit-scrollbar { height: 4px; width: 4px; }
        .sidebar-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        /* Toast Animation */
        @keyframes slideDownFade {
            0% { opacity: 0; transform: translate(-50%, -20px); }
            100% { opacity: 1; transform: translate(-50%, 0); }
        }
        .animate-toast { animation: slideDownFade 0.15s ease-out forwards; }

        /* شاشة التحميل الأصلية */
        #native-splash {
            position: fixed; inset: 0; z-index: 999999;
            background: linear-gradient(135deg, #1e3a8a 0%, #475569 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.15s ease-in-out;
        }
        #native-splash::after {
            content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at 50% 0%, rgba(255,255,255,0.05) 0%, transparent 70%);
            pointer-events: none;
        }
    </style>
</head>
<body class="pb-20 lg:pb-0">
    
    <!-- شاشة التحميل الفورية -->
    <div id="native-splash">
        <div style="position:relative; z-index:10; display:flex; flex-direction:column; align-items:center;">
            <div style="width:64px; height:64px; background:white; border-radius:50%; display:flex; align-items:center; justify-content:center; color:#1e3a8a; box-shadow:0 25px 50px -12px rgba(0,0,0,0.25); margin-bottom:16px;">
                <i class="fa-solid fa-graduation-cap" style="font-size: 30px;"></i>
            </div>
            <h1 style="font-size: 12px; font-weight: 900; color: white; margin-bottom: 4px; letter-spacing: 1px;">أهلاً بكم</h1>
            <p style="font-size: 10px; font-weight: 700; color: #d1d5db; display:flex; align-items:center; gap:6px; opacity: 0.9;">
                <i class="fa-solid fa-spinner fa-spin"></i>
                الرجاء انتظار التحميل...
            </p>
        </div>
    </div>

    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

        const firebaseConfig = {
            apiKey: "AIzaSyANg4wLchZaikXneXr1c3qhRgcOnvPbfoA",
            authDomain: "faculty-of-commerce-2026.firebaseapp.com",
            projectId: "faculty-of-commerce-2026",
            storageBucket: "faculty-of-commerce-2026.firebasestorage.app",
            messagingSenderId: "350727231766",
            appId: "1:350727231766:web:b08a0f335e38bfc2e79837",
            measurementId: "G-PR20GFXT58"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const CLOUD_NAME = 'dsxrjmcxs';
        const UPLOAD_PRESET = 'my_public_preset';
        const ADMIN_UID = 'mEVbroYWf7cg68SL8CB2uUS8XhZ2';

        // --- Toast Component ---
        const Toast = ({ message, type }) => {
            if (!message) return null;
            const bgClass = type === 'error' ? 'bg-red-600' : type === 'success' ? 'bg-green-600' : 'bg-blue-800';
            const icon = type === 'error' ? 'fa-triangle-exclamation' : type === 'success' ? 'fa-check-circle' : 'fa-circle-notch fa-spin';
            
            return (
                <div className={`fixed top-20 lg:top-24 left-1/2 -translate-x-1/2 ${bgClass} text-white px-5 py-2.5 rounded-full shadow-2xl text-xs font-bold z-[999] flex items-center gap-3 animate-toast whitespace-nowrap`}>
                    <i className={`fa-solid ${icon} text-sm`}></i>
                    {message}
                </div>
            );
        };

        // --- Internal Preview Modal ---
        const PreviewModal = ({ previewData, onClose, onNavigate }) => {
            useEffect(() => {
                if (previewData.items.length > 0) document.body.style.overflow = 'hidden';
                else document.body.style.overflow = 'auto';
                return () => { document.body.style.overflow = 'auto'; };
            }, [previewData]);

            if (previewData.items.length === 0) return null;

            const currentItem = previewData.items[previewData.index];
            const isPdf = currentItem.url.toLowerCase().includes('.pdf');
            const pdfViewerUrl = `https://docs.google.com/gview?url=${encodeURIComponent(currentItem.url)}&embedded=true`;

            return (
                <div className="fixed inset-0 z-[9999] flex items-center justify-center bg-black/95 p-2 md:p-10 transition-opacity duration-75">
                    <button onClick={onClose} className="absolute top-4 right-4 md:top-6 md:right-6 bg-red-600 text-white w-10 h-10 rounded-full flex items-center justify-center hover:bg-red-700 transition-colors duration-75 z-50 shadow-lg border-2 border-white">
                        <i className="fa-solid fa-xmark text-xl"></i>
                    </button>
                    
                    <div className="w-full h-full max-w-6xl bg-black rounded-xl overflow-hidden relative flex items-center justify-center shadow-2xl">
                        {isPdf ? (
                            <iframe src={pdfViewerUrl} className="w-full h-full border-0 bg-white" title="PDF Preview"></iframe>
                        ) : (
                            <img src={currentItem.url} alt="Preview" className="max-w-full max-h-full object-contain" />
                        )}

                        {previewData.items.length > 1 && (
                            <>
                                <button onClick={(e) => { e.stopPropagation(); onNavigate('prev'); }} className="absolute left-4 top-1/2 -translate-y-1/2 bg-black/60 hover:bg-black/90 text-white w-12 h-12 rounded-full transition-colors duration-75 flex items-center justify-center">
                                    <i className="fa-solid fa-chevron-left text-xl"></i>
                                </button>
                                <button onClick={(e) => { e.stopPropagation(); onNavigate('next'); }} className="absolute right-4 top-1/2 -translate-y-1/2 bg-black/60 hover:bg-black/90 text-white w-12 h-12 rounded-full transition-colors duration-75 flex items-center justify-center">
                                    <i className="fa-solid fa-chevron-right text-xl"></i>
                                </button>
                            </>
                        )}
                    </div>
                </div>
            );
        };

        // --- Ad Component ---
        const AdSlot = ({ id }) => {
            const adRef = useRef(null);
            const[hasAd, setHasAd] = useState(false);
            useEffect(() => { if (adRef.current && adRef.current.innerHTML.trim() !== "") setHasAd(true); },[]);
            return <div ref={adRef} className={`ad-container w-full transition-all duration-75 ${hasAd ? 'my-6 py-4 bg-gray-50 border' : 'h-0 overflow-hidden'}`}></div>;
        };

        // --- Dynamic Section Component ---
        const SectionView = ({ title, icon, data, hideYearFilter = false, showSystemFilter = false, onBack, onPreviewSingle }) => {
            const[filterYear, setFilterYear] = useState('الكل');
            const[filterSystem, setFilterSystem] = useState('الكل'); // فلتر انتظام/انتساب الجديد
            const[visibleCount, setVisibleCount] = useState(10);
            
            const years =['الكل', 'الفرقة الأولى', 'الفرقة الثانية', 'الفرقة الثالثة', 'الفرقة الرابعة'];
            const systems =['الكل', 'انتظام', 'انتساب'];
            
            const filtered = data.filter(item => {
                const matchYear = hideYearFilter || filterYear === 'الكل' || item.year === filterYear;
                
                // منطق فلترة النظام (إذا لم يكن للملف نظام محدد قديماً نعتبره "عام")
                const itemSystem = item.studySystem || 'عام';
                const matchSystem = !showSystemFilter || filterSystem === 'الكل' || itemSystem === 'عام' || itemSystem === filterSystem;
                
                return matchYear && matchSystem;
            });
            
            const visibleData = filtered.slice(0, visibleCount);

            const getThumbnail = (url) => {
                if (!url) return 'https://via.placeholder.com/300?text=No+Image';
                if (url.includes('cloudinary.com')) {
                    if (url.toLowerCase().endsWith('.pdf')) {
                        return url.replace('/upload/', '/upload/w_300,q_auto,f_auto/').replace(/\.pdf$/i, '.jpg');
                    }
                    return url.replace('/upload/', '/upload/w_300,q_auto,f_auto/');
                }
                return url;
            };

            const getDownloadUrl = (url) => {
                if (!url) return '';
                if (url.includes('cloudinary.com')) {
                    return url.replace('/upload/', '/upload/fl_attachment/');
                }
                return url;
            };

            const formatWhatsApp = (phone) => {
                if(!phone) return '';
                let cleanPhone = phone.replace(/\D/g, '');
                if(cleanPhone.startsWith('0')) cleanPhone = '2' + cleanPhone;
                return `https://wa.me/${cleanPhone}`;
            };

            return (
                <div className="bg-white p-4 md:p-6 rounded-2xl shadow-sm border border-gray-100">
                    <div className="flex items-center gap-3 mb-4 border-b pb-3">
                        <button onClick={onBack} className="text-gray-500 hover:text-blue-900 transition-colors duration-75 bg-gray-100 hover:bg-gray-200 w-8 h-8 rounded-full flex items-center justify-center flex-shrink-0">
                            <i className="fa-solid fa-arrow-right"></i>
                        </button>
                        <div className="text-blue-900 text-2xl"><i className={`fa-solid ${icon}`}></i></div>
                        <h2 className="text-lg md:text-xl font-bold text-gray-800">{title}</h2>
                    </div>

                    {/* فلاتر البحث */}
                    <div className="mb-4">
                        {!hideYearFilter && (
                            <div className="flex gap-1.5 overflow-x-auto mb-2 pb-2 sidebar-scroll">
                                {years.map(y => (
                                    <button key={y} onClick={() => {setFilterYear(y); setVisibleCount(10);}} className={`whitespace-nowrap px-3 py-1.5 rounded-full text-xs font-bold transition-colors duration-75 ${filterYear === y ? 'bg-blue-900 text-white' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}`}>
                                        {y}
                                    </button>
                                ))}
                            </div>
                        )}

                        {showSystemFilter && (
                            <div className="inline-flex bg-gray-100 p-1 rounded-xl">
                                {systems.map(s => (
                                    <button key={s} onClick={() => {setFilterSystem(s); setVisibleCount(10);}} className={`px-4 py-1.5 rounded-lg text-xs font-bold transition-all duration-150 ${filterSystem === s ? 'bg-white text-blue-900 shadow-sm' : 'text-gray-500 hover:text-gray-800'}`}>
                                        {s}
                                    </button>
                                ))}
                            </div>
                        )}
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                        {visibleData.length === 0 ? (
                            <div className="col-span-full text-center py-10 text-gray-400">لا توجد بيانات متاحة حالياً.</div>
                        ) : (
                            visibleData.map(item => (
                                <div key={item.id} className="p-3 border rounded-xl hover:shadow-md transition-shadow duration-75 flex flex-col sm:flex-row gap-4 bg-gray-50 relative">
                                    
                                    {/* علامة توضح هل الملف انتظام أم انتساب أم عام */}
                                    {showSystemFilter && item.studySystem && item.studySystem !== 'عام' && (
                                        <div className="absolute top-0 left-0 bg-yellow-400 text-blue-900 text-[9px] font-black px-2 py-0.5 rounded-br-lg rounded-tl-xl z-10">
                                            {item.studySystem}
                                        </div>
                                    )}

                                    <div className="w-full sm:w-24 h-32 sm:h-24 flex-shrink-0 rounded-lg overflow-hidden border bg-white relative cursor-pointer" onClick={() => onPreviewSingle(item.fileUrl)}>
                                        <img src={getThumbnail(item.fileUrl)} alt={item.title} loading="lazy" className="w-full h-full object-cover" onError={(e) => { e.target.src = 'https://via.placeholder.com/150?text=File' }} />
                                        {item.fileUrl?.endsWith('.pdf') && <div className="absolute bottom-1 right-1 bg-red-600 text-white text-[10px] px-1.5 rounded font-bold shadow">PDF</div>}
                                    </div>

                                    <div className="flex-grow flex flex-col justify-between">
                                        <div>
                                            {!hideYearFilter && (
                                                <div className="flex gap-2 mb-1 mt-1 sm:mt-0">
                                                    <span className="text-[10px] bg-blue-100 text-blue-700 px-2 py-0.5 rounded-full font-bold">{item.year}</span>
                                                </div>
                                            )}
                                            <h4 className="font-bold text-gray-800 text-sm md:text-base line-clamp-2">{item.title}</h4>
                                        </div>

                                        <div className="flex flex-wrap gap-2 mt-3">
                                            {item.fileUrl && (
                                                <>
                                                    <button onClick={() => onPreviewSingle(item.fileUrl)} className="flex-1 bg-blue-100 text-blue-900 text-xs py-1.5 px-2 rounded-lg font-bold text-center hover:bg-blue-200 transition-colors duration-75">
                                                        <i className="fa-solid fa-eye ml-1"></i> معاينة
                                                    </button>
                                                    <a href={getDownloadUrl(item.fileUrl)} download target="_blank" rel="noopener noreferrer" className="flex-1 bg-blue-900 text-white text-xs py-1.5 px-2 rounded-lg font-bold text-center hover:bg-blue-800 transition-colors duration-75">
                                                        <i className="fa-solid fa-download ml-1"></i> تحميل
                                                    </a>
                                                </>
                                            )}
                                            
                                            {item.link && (
                                                <a href={item.link} target="_blank" className="w-full bg-red-100 text-red-700 text-xs py-1.5 px-2 rounded-lg font-bold text-center hover:bg-red-200 transition-colors duration-75 mt-1">
                                                    <i className="fa-brands fa-youtube ml-1"></i> عرض الرابط
                                                </a>
                                            )}

                                            {item.phone && (
                                                <div className="w-full flex gap-2 mt-1">
                                                    <a href={formatWhatsApp(item.phone)} target="_blank" className="flex-1 bg-green-500 text-white text-xs py-1.5 px-2 rounded-lg font-bold text-center hover:bg-green-600 transition-colors duration-75">
                                                        <i className="fa-brands fa-whatsapp ml-1"></i> واتساب
                                                    </a>
                                                    <a href={`tel:${item.phone}`} className="flex-1 bg-gray-800 text-white text-xs py-1.5 px-2 rounded-lg font-bold text-center hover:bg-gray-900 transition-colors duration-75">
                                                        <i className="fa-solid fa-phone ml-1"></i> اتصال
                                                    </a>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                </div>
                            ))
                        )}
                    </div>
                    
                    {visibleCount < filtered.length && (
                        <div className="text-center mt-6">
                            <button onClick={() => setVisibleCount(prev => prev + 10)} className="bg-gray-200 text-gray-800 px-6 py-2 rounded-full font-bold text-sm hover:bg-gray-300 transition-colors duration-75">
                                عرض المزيد <i className="fa-solid fa-angle-down mr-1"></i>
                            </button>
                        </div>
                    )}
                </div>
            );
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const[isAdmin, setIsAdmin] = useState(false);
            const[page, setPage] = useState('home');
            const[materials, setMaterials] = useState([]);
            const[schedules, setSchedules] = useState([]);
            const[isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
            
            const[previewData, setPreviewData] = useState({ items:[], index: -1 });
            const[toast, setToast] = useState({ message: '', type: '' });

            const showToast = (message, type = 'info', duration = 3000) => {
                setToast({ message, type });
                if (duration) setTimeout(() => setToast({ message: '', type: '' }), duration);
            };

            const openSinglePreview = (url) => {
                if(url) setPreviewData({ items: [{ url }], index: 0 });
            };

            const openSliderPreview = (schedulesArray, clickedIndex) => {
                const items = schedulesArray.map(s => ({ url: s.url }));
                setPreviewData({ items, index: clickedIndex });
            };

            const handleModalNavigate = (direction) => {
                setPreviewData(prev => {
                    let newIdx = prev.index;
                    if(direction === 'next') newIdx = (prev.index + 1) % prev.items.length;
                    if(direction === 'prev') newIdx = (prev.index - 1 + prev.items.length) % prev.items.length;
                    return { ...prev, index: newIdx };
                });
            };

            useEffect(() => {
                document.body.style.overflow = 'hidden';

                let isDataLoaded = false;
                let minTimePassed = false;

                const checkReadyToHideSplash = () => {
                    if (isDataLoaded && minTimePassed) {
                        const splash = document.getElementById('native-splash');
                        if(splash) {
                            splash.style.opacity = '0';
                            document.body.style.overflow = '';
                            setTimeout(() => {
                                splash.remove();
                                showToast("مرحبا بكم في خدمات كلية التجارة", "success", 2500);
                            }, 150);
                        }
                    }
                };

                setTimeout(() => {
                    minTimePassed = true;
                    checkReadyToHideSplash();
                }, 400);

                onAuthStateChanged(auth, (u) => {
                    setUser(u);
                    setIsAdmin(u && u.uid === ADMIN_UID);
                });

                const unsubMat = onSnapshot(collection(db, 'materials'), (snap) => {
                    setMaterials(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                });
                
                const unsubSch = onSnapshot(collection(db, 'schedules'), (snap) => {
                    setSchedules(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                    isDataLoaded = true;
                    checkReadyToHideSplash();
                });

                return () => { unsubMat(); unsubSch(); };
            },[]);

            const getByType = (type) => materials.filter(m => m.sectionType === type).sort((a,b) => b.createdAt - a.createdAt);

            const navigate = (pg) => {
                setPage(pg);
                setIsMobileMenuOpen(false);
                window.scrollTo(0,0);
            };

            return (
                <div className="min-h-screen flex flex-col relative">

                    <Toast message={toast.message} type={toast.type} />
                    
                    <PreviewModal 
                        previewData={previewData} 
                        onClose={() => setPreviewData({ items:[], index: -1 })} 
                        onNavigate={handleModalNavigate}
                    />

                    {/* Navbar */}
                    <nav className="bg-blue-900 text-white sticky top-0 z-40 shadow-xl border-b-2 border-yellow-500">
                        <div className="container mx-auto px-4 flex justify-between items-center h-16">
                            <div className="flex items-center gap-3 cursor-pointer" onClick={() => navigate('home')}>
                                <div className="w-10 h-10 bg-white rounded-full flex items-center justify-center text-blue-900 shadow-inner">
                                    <i className="fa-solid fa-graduation-cap text-xl"></i>
                                </div>
                                <span className="font-black text-lg md:text-xl tracking-tighter">تجارة الزقازيق</span>
                            </div>
                            
                            <div className="hidden lg:flex items-center gap-1 text-sm">
                                <button onClick={() => navigate('home')} className={`px-3 py-5 transition-colors duration-75 ${page === 'home' ? 'nav-link-active' : ''}`}>الرئيسية</button>
                                <button onClick={() => navigate('lectures')} className={`px-3 py-5 transition-colors duration-75 ${page === 'lectures' ? 'nav-link-active' : ''}`}>المحاضرات</button>
                                <button onClick={() => navigate('notes')} className={`px-3 py-5 transition-colors duration-75 ${page === 'notes' ? 'nav-link-active' : ''}`}>المذكرات</button>
                                <button onClick={() => navigate('reviews')} className={`px-3 py-5 transition-colors duration-75 ${page === 'reviews' ? 'nav-link-active' : ''}`}>المراجعات</button>
                                <button onClick={() => navigate('activities')} className={`px-3 py-5 transition-colors duration-75 ${page === 'activities' ? 'nav-link-active' : ''}`}>الأنشطة</button>
                                <button onClick={() => navigate('training')} className={`px-3 py-5 transition-colors duration-75 ${page === 'training' ? 'nav-link-active' : ''}`}>التدريب</button>
                                <button onClick={() => navigate('jobs')} className={`px-3 py-5 transition-colors duration-75 ${page === 'jobs' ? 'nav-link-active' : ''}`}>الوظائف</button>
                                
                                {/* زر الإدارة/دخول المحسن في الهيدر */}
                                <button onClick={() => navigate(isAdmin ? 'adminDash' : 'admin')} className="mr-4 bg-gradient-to-l from-yellow-400 to-yellow-500 text-blue-950 px-5 py-1.5 rounded-full font-black text-xs shadow-md hover:shadow-lg hover:-translate-y-0.5 transition-all duration-150 flex items-center gap-2">
                                    <i className={`fa-solid ${isAdmin ? 'fa-user-shield' : 'fa-right-to-bracket'}`}></i>
                                    {isAdmin ? 'الإدارة' : 'دخول'}
                                </button>
                            </div>

                            <button className="lg:hidden text-2xl p-2" onClick={() => setIsMobileMenuOpen(true)}>
                                <i className="fa-solid fa-bars"></i>
                            </button>
                        </div>
                    </nav>

                    {/* Mobile Sidebar */}
                    <div className={`fixed inset-0 bg-black/60 z-[100] transition-opacity duration-75 lg:hidden ${isMobileMenuOpen ? 'opacity-100 visible' : 'opacity-0 invisible'}`} onClick={() => setIsMobileMenuOpen(false)}></div>
                    <div className={`fixed top-0 right-0 h-full w-64 bg-white z-[101] shadow-2xl transform transition-transform duration-75 ease-in-out lg:hidden flex flex-col ${isMobileMenuOpen ? 'translate-x-0' : 'translate-x-full'}`}>
                        <div className="bg-blue-900 text-white p-5 flex justify-between items-center">
                            <span className="font-bold text-lg">القائمة</span>
                            <button onClick={() => setIsMobileMenuOpen(false)} className="text-2xl"><i className="fa-solid fa-xmark"></i></button>
                        </div>
                        <div className="flex flex-col p-4 gap-2 overflow-y-auto sidebar-scroll">
                            <SidebarBtn icon="fa-house" label="الرئيسية" active={page==='home'} onClick={() => navigate('home')} />
                            <SidebarBtn icon="fa-person-chalkboard" label="المحاضرات" active={page==='lectures'} onClick={() => navigate('lectures')} />
                            <SidebarBtn icon="fa-book" label="المذكرات" active={page==='notes'} onClick={() => navigate('notes')} />
                            <SidebarBtn icon="fa-file-shield" label="المراجعات" active={page==='reviews'} onClick={() => navigate('reviews')} />
                            <SidebarBtn icon="fa-users-gear" label="الأنشطة العامة" active={page==='activities'} onClick={() => navigate('activities')} />
                            <SidebarBtn icon="fa-graduation-cap" label="التدريب والكورسات" active={page==='training'} onClick={() => navigate('training')} />
                            <SidebarBtn icon="fa-briefcase" label="الوظائف" active={page==='jobs'} onClick={() => navigate('jobs')} />
                            <SidebarBtn icon="fa-map-location" label="دليل الطالب" active={page==='guide'} onClick={() => navigate('guide')} />
                            <SidebarBtn icon="fa-circle-info" label="من نحن" active={page==='about'} onClick={() => navigate('about')} />
                            
                            <hr className="my-2 border-gray-200 w-full" />
                            
                            {/* زر تسجيل الدخول المحسن في القائمة الجانبية */}
                            <button onClick={() => {navigate(isAdmin ? 'adminDash' : 'admin'); setIsMobileMenuOpen(false);}} className="flex items-center justify-center gap-2 w-full p-3 rounded-xl transition-all duration-150 font-black text-sm bg-gradient-to-r from-yellow-400 to-yellow-500 text-blue-950 shadow-md mt-2 hover:scale-105">
                                <i className={`fa-solid ${isAdmin ? 'fa-user-shield' : 'fa-right-to-bracket'}`}></i>
                                {isAdmin ? 'لوحة الإدارة' : 'تسجيل الدخول'}
                            </button>
                        </div>
                    </div>

                    {/* Main Content */}
                    <main className="flex-grow container mx-auto px-4 py-6 max-w-5xl">
                        <AdSlot id="top-ad" />

                        {page === 'home' && (
                            <div className="space-y-8">
                                <div className="relative rounded-3xl overflow-hidden h-56 shadow-2xl">
                                    <img src="https://images.unsplash.com/photo-1562774053-701939374585?ixlib=rb-4.0.3&auto=format&fit=crop&w=1000&q=80" className="w-full h-full object-cover" alt="الكلية" />
                                    <div className="absolute inset-0 bg-gradient-to-r from-blue-900/90 to-transparent flex flex-col justify-center px-8 text-white">
                                        <h2 className="text-3xl font-black mb-2">بوابة كلية التجارة</h2>
                                        <p className="opacity-80 font-bold">جامعة الزقازيق - شهاب طارق صلاح</p>
                                    </div>
                                </div>

                                <HomeSlider schedules={schedules} onPreviewSlider={openSliderPreview} />

                                <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                                    <HomeCard icon="fa-person-chalkboard" label="المحاضرات" color="bg-blue-600" onClick={() => navigate('lectures')} />
                                    <HomeCard icon="fa-book" label="المذكرات" color="bg-indigo-600" onClick={() => navigate('notes')} />
                                    <HomeCard icon="fa-file-shield" label="المراجعات" color="bg-red-600" onClick={() => navigate('reviews')} />
                                    <HomeCard icon="fa-users-gear" label="الأنشطة" color="bg-green-600" onClick={() => navigate('activities')} />
                                    <HomeCard icon="fa-graduation-cap" label="التدريب" color="bg-orange-600" onClick={() => navigate('training')} />
                                    <HomeCard icon="fa-briefcase" label="الوظائف" color="bg-cyan-600" onClick={() => navigate('jobs')} />
                                    <HomeCard icon="fa-map-location" label="دليل الطالب" color="bg-purple-600" onClick={() => navigate('guide')} />
                                    <HomeCard icon="fa-circle-info" label="من نحن" color="bg-gray-600" onClick={() => navigate('about')} />
                                </div>
                            </div>
                        )}

                        {/* تمرير showSystemFilter للأقسام التي تحتاجها */}
                        {page === 'lectures' && <SectionView title="قسم المحاضرات" icon="fa-person-chalkboard" data={getByType('lectures')} showSystemFilter={true} onBack={() => navigate('home')} onPreviewSingle={openSinglePreview} />}
                        {page === 'notes' && <SectionView title="قسم المذكرات" icon="fa-book" data={getByType('notes')} showSystemFilter={true} onBack={() => navigate('home')} onPreviewSingle={openSinglePreview} />}
                        {page === 'reviews' && <SectionView title="قسم المراجعات والامتحانات" icon="fa-file-shield" data={getByType('reviews')} showSystemFilter={true} onBack={() => navigate('home')} onPreviewSingle={openSinglePreview} />}
                        
                        {page === 'activities' && <SectionView title="معرض الأنشطة العام" icon="fa-users-gear" data={getByType('activities')} hideYearFilter={true} onBack={() => navigate('home')} onPreviewSingle={openSinglePreview} />}
                        {page === 'training' && <SectionView title="التدريب والكورسات" icon="fa-graduation-cap" data={getByType('training')} onBack={() => navigate('home')} onPreviewSingle={openSinglePreview} />}
                        {page === 'jobs' && <SectionView title="الوظائف المتاحة" icon="fa-briefcase" data={getByType('jobs')} hideYearFilter={true} onBack={() => navigate('home')} onPreviewSingle={openSinglePreview} />}
                        {page === 'guide' && <SectionView title="دليل الطالب" icon="fa-map-location" data={getByType('guide')} onBack={() => navigate('home')} onPreviewSingle={openSinglePreview} />}
                        
                        {page === 'about' && <AboutPage onBack={() => navigate('home')} />}
                        {page === 'admin' && !isAdmin && <AdminLogin onSuccess={() => { showToast("تم تسجيل الدخول بنجاح", "success"); setPage('adminDash'); }} showToast={showToast} />}
                        {page === 'adminDash' && isAdmin && <AdminDashboard materials={materials} schedules={schedules} onBack={() => navigate('home')} showToast={showToast} />}
                        
                        <AdSlot id="bottom-ad" />
                    </main>

                    {/* Bottom Nav */}
                    <div className="lg:hidden fixed bottom-0 w-full bg-white border-t flex justify-around py-3 text-blue-900 z-50 shadow-[0_-4px_20px_rgba(0,0,0,0.1)] rounded-t-2xl">
                        <button onClick={() => navigate('home')} className={`flex flex-col items-center transition-colors duration-75 ${page === 'home' ? 'text-yellow-500' : 'text-blue-900'}`}>
                            <i className="fa-solid fa-house text-lg"></i><span className="text-[10px] mt-1 font-bold">الرئيسية</span>
                        </button>
                        <button onClick={() => navigate('lectures')} className={`flex flex-col items-center transition-colors duration-75 ${page === 'lectures' ? 'text-yellow-500' : 'text-blue-900'}`}>
                            <i className="fa-solid fa-person-chalkboard text-lg"></i><span className="text-[10px] mt-1 font-bold">المحاضرات</span>
                        </button>
                        <button onClick={() => navigate('notes')} className={`flex flex-col items-center transition-colors duration-75 ${page === 'notes' ? 'text-yellow-500' : 'text-blue-900'}`}>
                            <i className="fa-solid fa-book text-lg"></i><span className="text-[10px] mt-1 font-bold">المذكرات</span>
                        </button>
                        <button onClick={() => navigate('activities')} className={`flex flex-col items-center transition-colors duration-75 ${page === 'activities' ? 'text-yellow-500' : 'text-blue-900'}`}>
                            <i className="fa-solid fa-users-gear text-lg"></i><span className="text-[10px] mt-1 font-bold">الأنشطة</span>
                        </button>
                    </div>

                    <footer className="bg-blue-950 text-white py-12 text-center mt-12">
                        <div className="container mx-auto px-4">
                            <div className="mb-6 flex justify-center gap-6 text-2xl">
                                <a href="#" className="hover:text-yellow-500 transition-colors duration-75"><i className="fa-brands fa-facebook"></i></a>
                                <a href="#" className="hover:text-yellow-500 transition-colors duration-75"><i className="fa-brands fa-instagram"></i></a>
                                <a href="#" className="hover:text-yellow-500 transition-colors duration-75"><i className="fa-brands fa-telegram"></i></a>
                            </div>
                            <p className="font-bold mb-2">جميع الحقوق محفوظة &copy; {new Date().getFullYear()}</p>
                            <p className="text-sm opacity-60">تصميم وتطوير: شهاب طارق صلاح</p>
                        </div>
                    </footer>
                </div>
            );
        };

        const SidebarBtn = ({ icon, label, active, onClick, color="text-gray-700" }) => (
            <button onClick={onClick} className={`flex items-center gap-3 w-full p-3 rounded-xl transition-all duration-75 font-bold text-sm border-r-4 ${active ? 'bg-blue-50 text-blue-900 border-blue-900' : `border-transparent hover:bg-gray-50 ${color}`}`}>
                <div className="w-6 flex justify-center"><i className={`fa-solid ${icon} text-lg`}></i></div>
                <span className="text-right flex-1">{label}</span>
            </button>
        );

        const HomeCard = ({ icon, label, color, onClick }) => (
            <div onClick={onClick} className={`${color} p-4 rounded-2xl text-white flex flex-col items-center justify-center gap-2 shadow-lg hover:scale-105 transition-transform duration-75 cursor-pointer`}>
                <i className={`fa-solid ${icon} text-2xl`}></i>
                <span className="font-bold text-xs">{label}</span>
            </div>
        );

        const HomeSlider = ({ schedules, onPreviewSlider }) => {
            const [idx, setIdx] = useState(0);
            if (!schedules.length) return null;

            return (
                <div className="relative w-full rounded-3xl overflow-hidden shadow-xl group border-4 border-white">
                    <div className="bg-blue-900 text-white text-center py-2 text-sm font-bold">
                        {schedules[idx].title || 'جداول المحاضرات الرسمية'}
                    </div>
                    <div className="h-64 md:h-96 relative bg-gray-100 cursor-pointer" onClick={() => onPreviewSlider(schedules, idx)}>
                        <img src={schedules[idx].url} className="w-full h-full object-contain" />
                        <button onClick={(e) => { e.preventDefault(); e.stopPropagation(); setIdx(i => (i-1+schedules.length)%schedules.length); }} className="absolute left-2 top-1/2 -translate-y-1/2 bg-black/50 hover:bg-black/80 text-white w-8 h-8 rounded-full transition-colors z-20"><i className="fa-solid fa-chevron-left"></i></button>
                        <button onClick={(e) => { e.preventDefault(); e.stopPropagation(); setIdx(i => (i+1)%schedules.length); }} className="absolute right-2 top-1/2 -translate-y-1/2 bg-black/50 hover:bg-black/80 text-white w-8 h-8 rounded-full transition-colors z-20"><i className="fa-solid fa-chevron-right"></i></button>
                    </div>
                    <div className="flex justify-center gap-1 py-2 bg-white">
                        {schedules.map((_, i) => <div key={i} className={`h-1.5 rounded-full transition-all duration-75 ${i === idx ? 'w-6 bg-blue-900' : 'w-2 bg-gray-300'}`}></div>)}
                    </div>
                </div>
            );
        };

        const AdminLogin = ({ onSuccess, showToast }) => {
            const[e, setE] = useState('');
            const[p, setP] = useState('');
            const handle = async () => {
                showToast("جاري التحقق...", "info", 1000);
                try {
                    const cred = await signInWithEmailAndPassword(auth, e, p);
                    if (cred.user.uid === ADMIN_UID) onSuccess();
                    else showToast("ليس لديك صلاحية الدخول", "error");
                } catch { showToast("خطأ في البريد أو كلمة المرور", "error"); }
            };
            return (
                <div className="max-w-md mx-auto bg-white p-8 rounded-2xl shadow-xl mt-10">
                    <h2 className="text-2xl font-bold mb-6 text-center text-blue-900">تسجيل دخول الإدارة</h2>
                    <input type="email" placeholder="البريد" className="w-full mb-4 border p-3 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-900" onChange={v=>setE(v.target.value)} />
                    <input type="password" placeholder="كلمة المرور" className="w-full mb-6 border p-3 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-900" onChange={v=>setP(v.target.value)} />
                    <button onClick={handle} className="w-full bg-blue-900 text-white py-3 rounded-xl font-bold hover:bg-blue-800 transition-colors duration-75">دخول</button>
                </div>
            );
        };

        const AdminDashboard = ({ materials, schedules, onBack, showToast }) => {
            const [title, setTitle] = useState('');
            const[sec, setSec] = useState('lectures');
            const[year, setYear] = useState('الفرقة الأولى');
            const[studySystem, setStudySystem] = useState('عام'); // حقل نظام الدراسة الجديد
            const[link, setLink] = useState('');
            const[phone, setPhone] = useState('');
            const[loading, setLoading] = useState(false);
            const[uploadProgress, setUploadProgress] = useState(0);
            const[uploadQueue, setUploadQueue] = useState([]);
            
            const[confirmDelete, setConfirmDelete] = useState(null);

            const handleFileChange = (e) => {
                const files = Array.from(e.target.files);
                setUploadQueue(files.map(f => ({ file: f, title: f.name.split('.')[0] })));
            };

            const uploadFileWithProgress = (file) => {
                return new Promise((resolve, reject) => {
                    const xhr = new XMLHttpRequest();
                    xhr.open('POST', `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/auto/upload`);
                    
                    xhr.upload.onprogress = (e) => {
                        if (e.lengthComputable) {
                            const percent = Math.round((e.loaded / e.total) * 100);
                            setUploadProgress(percent);
                        }
                    };
                    
                    xhr.onload = () => {
                        if (xhr.status === 200) resolve(JSON.parse(xhr.responseText));
                        else reject(JSON.parse(xhr.responseText));
                    };
                    xhr.onerror = () => reject("Network Error");
                    
                    const formData = new FormData();
                    formData.append('file', file);
                    formData.append('upload_preset', UPLOAD_PRESET);
                    xhr.send(formData);
                });
            };

            const upload = async () => {
                setLoading(true);
                setUploadProgress(0);
                try {
                    const finalStudySystem = (sec === 'lectures' || sec === 'notes' || sec === 'reviews') ? studySystem : 'عام';

                    if (uploadQueue.length > 0) {
                        for (let i=0; i<uploadQueue.length; i++) {
                            const item = uploadQueue[i];
                            if (!item.title) continue;
                            
                            showToast(`جاري رفع الملف (${i+1}/${uploadQueue.length})...`, "info", 0);
                            setUploadProgress(0);

                            let fileUrl = null;
                            let fileToUpload = item.file;
                            let isPdf = fileToUpload.type === 'application/pdf' || fileToUpload.name.toLowerCase().endsWith('.pdf');
                            
                            if (fileToUpload.type.startsWith('image/')) {
                                try {
                                    fileToUpload = await imageCompression(fileToUpload, { maxSizeMB: 0.5, maxWidthOrHeight: 1280, useWebWorker: true });
                                } catch (e) { console.error("Compression failed", e); }
                            }

                            const d = await uploadFileWithProgress(fileToUpload);
                            
                            if (!isPdf && d.secure_url.includes('/upload/')) {
                                fileUrl = d.secure_url.replace('/upload/', '/upload/q_auto,f_auto/');
                            } else {
                                fileUrl = d.secure_url;
                            }
                            
                            if (sec === 'schedule') {
                                await addDoc(collection(db, 'schedules'), { title: item.title, url: fileUrl, createdAt: Date.now() });
                            } else {
                                await addDoc(collection(db, 'materials'), { 
                                    title: item.title, fileUrl: fileUrl, sectionType: sec, 
                                    year: (sec === 'jobs' || sec === 'activities') ? 'عام' : year, 
                                    studySystem: finalStudySystem,
                                    link: sec === 'training' ? link : null, phone: sec === 'jobs' ? phone : null,
                                    createdAt: Date.now(), department: 'عام'
                                });
                            }
                        }
                    } else {
                        if (!title) { showToast("اكتب العنوان أولاً", "error"); setLoading(false); return; }
                        showToast("جاري النشر...", "info", 0);
                        await addDoc(collection(db, 'materials'), { 
                            title: title, fileUrl: null, sectionType: sec, 
                            year: (sec === 'jobs' || sec === 'activities') ? 'عام' : year, 
                            studySystem: finalStudySystem,
                            link: sec === 'training' ? link : null, phone: sec === 'jobs' ? phone : null,
                            createdAt: Date.now(), department: 'عام'
                        });
                    }
                    
                    showToast("تمت الإضافة بنجاح", "success");
                    setTitle(''); setLink(''); setPhone(''); setUploadQueue([]); setUploadProgress(0);
                    document.getElementById('fileInput').value = '';
                } catch(e) { 
                    showToast("حدث خطأ أثناء الرفع", "error"); 
                    console.error(e); 
                }
                setLoading(false);
            };

            const requestDelete = (col, id) => {
                setConfirmDelete({ col, id });
            };

            const executeDelete = async () => {
                if (!confirmDelete) return;
                try {
                    await deleteDoc(doc(db, confirmDelete.col, confirmDelete.id));
                    showToast("تم الحذف بنجاح", "success");
                } catch (error) {
                    showToast("حدث خطأ أثناء الحذف", "error");
                }
                setConfirmDelete(null);
            };

            return (
                <div className="bg-white p-6 rounded-2xl shadow-xl space-y-8 relative">
                    <div className="flex justify-between items-center border-b pb-4">
                        <div className="flex items-center gap-3">
                            <button onClick={onBack} className="text-gray-500 hover:text-blue-900 transition-colors duration-75 bg-gray-100 hover:bg-gray-200 w-8 h-8 rounded-full flex items-center justify-center">
                                <i className="fa-solid fa-arrow-right"></i>
                            </button>
                            <h2 className="text-xl font-bold">لوحة التحكم</h2>
                        </div>
                        <button onClick={()=>{signOut(auth); showToast("تم تسجيل الخروج","success");}} className="text-red-600 text-sm font-bold bg-red-50 px-3 py-1 rounded-full">خروج</button>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <select className="border p-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-900" value={sec} onChange={v=>setSec(v.target.value)}>
                            <option value="lectures">قسم المحاضرات</option>
                            <option value="notes">قسم المذكرات</option>
                            <option value="reviews">قسم المراجعات</option>
                            <option value="activities">قسم الأنشطة (عام)</option>
                            <option value="training">قسم التدريب والكورسات</option>
                            <option value="jobs">قسم الوظائف (عام)</option>
                            <option value="guide">دليل الطالب</option>
                            <option value="schedule">جدول محاضرات (سلايدر)</option>
                        </select>

                        {sec !== 'jobs' && sec !== 'activities' && sec !== 'schedule' && (
                            <select className="border p-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-900" value={year} onChange={v=>setYear(v.target.value)}>
                                <option>الفرقة الأولى</option><option>الفرقة الثانية</option><option>الفرقة الثالثة</option><option>الفرقة الرابعة</option>
                            </select>
                        )}

                        {/* حقل اختيار النظام الدراسي */}
                        {(sec === 'lectures' || sec === 'notes' || sec === 'reviews') && (
                            <select className="border p-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-900 col-span-1 md:col-span-2" value={studySystem} onChange={v=>setStudySystem(v.target.value)}>
                                <option value="عام">عام (يظهر لطلاب الانتظام والانتساب)</option>
                                <option value="انتظام">انتظام فقط</option>
                                <option value="انتساب">انتساب فقط</option>
                            </select>
                        )}

                        {sec === 'training' && <input placeholder="رابط خارجي (مثال: يوتيوب)" value={link} className="border p-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-900" onChange={v=>setLink(v.target.value)} />}
                        {sec === 'jobs' && <input placeholder="رقم الهاتف (للتواصل واتساب/اتصال)" value={phone} className="border p-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-900" onChange={v=>setPhone(v.target.value)} />}

                        <div className="flex flex-col col-span-1 md:col-span-2 border-t pt-4 mt-2">
                            <label className="text-sm font-bold text-blue-900 mb-2">اختر الملفات (يمكنك تحديد أكثر من ملف):</label>
                            <input id="fileInput" type="file" multiple className="border p-2 rounded bg-gray-50" onChange={handleFileChange} />
                        </div>

                        {uploadQueue.length === 0 && (
                            <input placeholder="العنوان (اسم الملف أو الوظيفة)" value={title} className="border p-2 rounded col-span-1 md:col-span-2 focus:outline-none focus:ring-2 focus:ring-blue-900" onChange={v=>setTitle(v.target.value)} />
                        )}

                        {uploadQueue.length > 0 && (
                            <div className="col-span-1 md:col-span-2 bg-blue-50 p-4 rounded-xl space-y-3">
                                <label className="text-sm font-bold text-blue-900">أضف وصفاً/عنواناً لكل ملف محدد:</label>
                                {uploadQueue.map((item, idx) => (
                                    <div key={idx} className="flex flex-col sm:flex-row items-center gap-2 bg-white p-2 rounded border">
                                        <span className="text-xs text-gray-500 w-full sm:w-1/3 truncate" dir="ltr">{item.file.name}</span>
                                        <input className="border p-2 rounded w-full sm:w-2/3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-900" value={item.title} placeholder="اكتب العنوان أو الوصف هنا..." onChange={(e) => { const newQ = [...uploadQueue]; newQ[idx].title = e.target.value; setUploadQueue(newQ); }} />
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>

                    <button onClick={upload} disabled={loading} className="w-full bg-green-600 text-white py-3 rounded-xl font-bold shadow-lg hover:bg-green-700 transition-colors duration-75 flex justify-center items-center gap-2">
                        {loading ? (
                            <>
                                <i className="fa-solid fa-circle-notch fa-spin"></i>
                                جاري الرفع... {uploadProgress}%
                            </>
                        ) : 'إضافة الآن'}
                    </button>

                    <div className="mt-8 border-t pt-8">
                        <h3 className="font-bold mb-4">إدارة الملفات المرفوعة:</h3>
                        <div className="space-y-2 max-h-64 overflow-y-auto sidebar-scroll">
                            {materials.map(m => (
                                <div key={m.id} className="flex justify-between items-center p-3 bg-gray-50 border rounded-lg text-sm">
                                    <span className="font-bold line-clamp-1">
                                        {m.title} 
                                        <span className="text-xs text-gray-400 font-normal mr-1">({m.sectionType})</span>
                                        {m.studySystem && m.studySystem !== 'عام' && <span className="text-[10px] bg-yellow-100 text-yellow-800 px-1.5 rounded mr-2">{m.studySystem}</span>}
                                    </span>
                                    <button onClick={()=>requestDelete('materials', m.id)} className="text-red-500 hover:text-red-700 bg-red-100 w-8 h-8 rounded-full flex items-center justify-center transition-colors duration-75"><i className="fa-solid fa-trash"></i></button>
                                </div>
                            ))}
                            {schedules.map(s => (
                                <div key={s.id} className="flex justify-between items-center p-3 bg-yellow-50 border rounded-lg text-sm">
                                    <span className="font-bold line-clamp-1">{s.title} <span className="text-xs text-gray-400 font-normal">(سلايدر)</span></span>
                                    <button onClick={()=>requestDelete('schedules', s.id)} className="text-red-500 hover:text-red-700 bg-red-100 w-8 h-8 rounded-full flex items-center justify-center transition-colors duration-75"><i className="fa-solid fa-trash"></i></button>
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* نافذة تأكيد الحذف */}
                    {confirmDelete && (
                        <div className="fixed inset-0 z-[9999] bg-black/60 flex items-center justify-center p-4 backdrop-blur-sm transition-opacity">
                            <div className="bg-white rounded-2xl p-6 max-w-sm w-full shadow-2xl transform transition-all text-center">
                                <div className="w-16 h-16 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-4 text-red-600 text-3xl">
                                    <i className="fa-solid fa-triangle-exclamation"></i>
                                </div>
                                <h3 className="text-xl font-bold text-gray-800 mb-2">تأكيد الحذف</h3>
                                <p className="text-gray-500 mb-6 text-sm">هل أنت متأكد من حذف هذا العنصر؟ لا يمكن التراجع عن هذه الخطوة.</p>
                                <div className="flex gap-3">
                                    <button onClick={executeDelete} className="flex-1 bg-red-600 text-white py-2.5 rounded-xl font-bold hover:bg-red-700 transition-colors">تأكيد الحذف</button>
                                    <button onClick={() => setConfirmDelete(null)} className="flex-1 bg-gray-200 text-gray-800 py-2.5 rounded-xl font-bold hover:bg-gray-300 transition-colors">إلغاء</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const AboutPage = ({ onBack }) => (
            <div className="bg-white p-8 rounded-2xl shadow-lg leading-relaxed">
                <div className="flex items-center gap-3 mb-4 border-b pb-3">
                    <button onClick={onBack} className="text-gray-500 hover:text-blue-900 transition-colors duration-75 bg-gray-100 hover:bg-gray-200 w-8 h-8 rounded-full flex items-center justify-center flex-shrink-0">
                        <i className="fa-solid fa-arrow-right"></i>
                    </button>
                    <h2 className="text-2xl font-bold text-blue-900">من نحن؟</h2>
                </div>
                <p className="mb-4">موقع كلية التجارة جامعة الزقازيق هو مبادرة طلابية تهدف إلى توفير كافة المصادر التعليمية من محاضرات ومذكرات بشكل منظم وسهل الوصول.</p>
                <p className="mb-4">تم بناء هذا الموقع لخدمة أكثر من 30 ألف طالب في الكلية، مع التركيز على تحديث المحتوى يومياً.</p>
                <div className="bg-blue-50 p-4 rounded-xl border-l-4 border-blue-900">
                    <p className="text-sm font-bold">إشراف وتطوير: شهاب طارق صلاح</p>
                </div>
                <h3 className="font-bold mt-8 mb-2">سياسة الخصوصية وحقوق الملكية:</h3>
                <p className="text-xs text-gray-500">نحن نحترم حقوق الملكية الفكرية، كافة الملفات المرفوعة هي ملخصات طلابية. إذا كنت تعتقد أن هناك محتوى ينتهك حقوقك يرجى مراسلتنا فوراً.</p>
            </div>
        );

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
