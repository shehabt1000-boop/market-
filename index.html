    <!-- مكتبة ضغط الصور في المتصفح -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/browser-image-compression@2.0.2/dist/browser-image-compression.js"></script>

        {
            "imports": {

<!-- بيانات المعاينة (Meta Tags for Social Media) -->

    <meta property="og:image" content="https://res.cloudinary.com/dsxrjmcxs/image/upload/c_fill,g_auto,w_1364,h_768,q_auto:eco,f_auto/v1776437104/sm5iuilfl3r1fkmg7jyh.png">

    <meta name="twitter:image" content="https://res.cloudinary.com/dsxrjmcxs/image/upload/c_fill,g_auto,w_1364,h_768,q_auto:eco,f_auto/v1776437104/sm5iuilfl3r1fkmg7jyh.png">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap');

        /* خلفية الموقع مريحة للعين */
        body { font-family: 'Cairo', sans-serif; background-color: #eef2f6; overflow-x: hidden; }

        .ad-container:empty { display: none !important; }
        .nav-link-active { border-bottom: 3px solid #fbbf24; color: #fbbf24 !important; }

        /* Custom Scrollbar */
        .sidebar-scroll::-webkit-scrollbar { height: 4px; width: 4px; }
        .sidebar-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        /* إخفاء شريط التمرير الأفقي في الفلاتر */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* تسريع الانيميشن ليكون شبه معدوم لمنع اللاج */
        @keyframes slideDownFade {
            0% { opacity: 0; transform: translate(-50%, -10px); }
            100% { opacity: 1; transform: translate(-50%, 0); }
        }
        .animate-toast { animation: slideDownFade 0.05s ease-out forwards; }

        @keyframes fadeInItem {
            from { opacity: 0; transform: translateY(2px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in { animation: fadeInItem 0.01s ease-out forwards; }

        @keyframes highlightCard {
            0% { box-shadow: 0 0 0 3px #fbbf24; background-color: #fef3c7; }
            100% { box-shadow: 0 0 0 0 transparent; background-color: #fafbfc; }
        }
        .highlight-item { animation: highlightCard 1s ease-out forwards; }

        /* جعل جميع الانتقالات سريعة جداً (50 ملي ثانية) */
        .duration-300, .duration-150, .duration-75, .transition-all, .transition-colors {
            transition-duration: 50ms !important;
        }

        /* تحسين الأداء الخارق: عدم معالجة العناصر خارج الشاشة */
        .optimized-card {
            content-visibility: auto;
            contain-intrinsic-size: 150px;
            will-change: opacity;
        }

        #native-splash {
            position: fixed; inset: 0; z-index: 999999;
            background: linear-gradient(135deg, #1e3a8a 0%, #475569 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.1s ease-in-out;
        }
        #native-splash::after {
            content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at 50% 0%, rgba(255,255,255,0.05) 0%, transparent 70%);
            pointer-events: none;
        }

        .bg-soft-white { background-color: #fafbfc; }
    </style>
</head>
<body class="pb-20 lg:pb-0 text-gray-800">

    <div id="native-splash">
        <div style="position:relative; z-index:10; display:flex; flex-direction:column; align-items:center;">
            <div style="width:64px; height:64px; background:white; border-radius:50%; display:flex; align-items:center; justify-content:center; color:#1e3a8a; box-shadow:0 25px 50px -12px rgba(0,0,0,0.25); margin-bottom:16px;">
                <i class="fa-solid fa-graduation-cap" style="font-size: 30px;"></i>
            </div>
            <h1 style="font-size: 12px; font-weight: 900; color: white; margin-bottom: 4px; letter-spacing: 1px;">أهلاً بكم</h1>
            <p style="font-size: 10px; font-weight: 700; color: #d1d5db; display:flex; align-items:center; gap:6px; opacity: 0.9;">
                <i class="fa-solid fa-spinner fa-spin"></i>
                الرجاء انتظار التحميل...
            </p>
        </div>
    </div>

    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef, useMemo } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

        const firebaseConfig = {
            apiKey: "AIzaSyANg4wLchZaikXneXr1c3qhRgcOnvPbfoA",
            authDomain: "faculty-of-commerce-2026.firebaseapp.com",
            projectId: "faculty-of-commerce-2026",
            storageBucket: "faculty-of-commerce-2026.firebasestorage.app",
            messagingSenderId: "350727231766",
            appId: "1:350727231766:web:b08a0f335e38bfc2e79837",
            measurementId: "G-PR20GFXT58"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const CLOUD_NAME = 'dsxrjmcxs';
        const UPLOAD_PRESET = 'my_public_preset';
        const ADMIN_UID = 'mEVbroYWf7cg68SL8CB2uUS8XhZ2';

        // دوال مساعدة عامة للصور والفيديو
        const isVideoUrl = (url) => {
            if (!url) return false;
            return url.match(/\.(mp4|webm|ogg|mov)$/i) || url.includes('/video/upload/');
        };

        const getThumbnail = (url, type = 'default') => {
            if (!url) return 'https://via.placeholder.com/300x300?text=No+Image';
            if (url.includes('cloudinary.com')) {
                // استخدام جودة eco لسرعة خارقة، وتحديد أبعاد ثابتة حسب النوع
                let transform = '/upload/w_300,h_300,c_fill,q_auto:eco,f_auto/';
                if (type === 'a4') transform = '/upload/w_200,h_280,c_fill,q_auto:eco,f_auto/';
                if (type === 'slider') transform = '/upload/w_800,h_400,c_fit,q_auto:eco,f_auto/';
                
                if (url.toLowerCase().endsWith('.pdf')) {
                    return url.replace('/upload/', transform).replace(/\.pdf$/i, '.jpg');
                }
                if (isVideoUrl(url)) {
                    return url.replace('/upload/', transform).replace(/\.(mp4|webm|ogg|mov)$/i, '.jpg');
                }
                return url.replace('/upload/', transform);
            }
            return url;
        };

        const Toast = ({ message, type }) => {
            if (!message) return null;
            const bgClass = type === 'error' ? 'bg-red-600' : type === 'success' ? 'bg-green-600' : 'bg-blue-800';
            const icon = type === 'error' ? 'fa-triangle-exclamation' : type === 'success' ? 'fa-check-circle' : 'fa-circle-notch fa-spin';

            return (
                <div className={`fixed top-20 lg:top-24 left-1/2 -translate-x-1/2 ${bgClass} text-white px-5 py-2.5 rounded-full shadow-lg text-xs font-bold z-[999] flex items-center gap-3 animate-toast whitespace-nowrap`}>
                    <i className={`fa-solid ${icon} text-sm`}></i>
                    {message}
                </div>
            );
        };

        const PreviewModal = ({ previewData, onClose, onNavigate }) => {
            useEffect(() => {
                if (previewData.items.length > 0) document.body.style.overflow = 'hidden';
                else document.body.style.overflow = 'auto';
                return () => { document.body.style.overflow = 'auto'; };
            },[previewData]);

            if (previewData.items.length === 0) return null;

            const currentItem = previewData.items[previewData.index];
            const isPdf = currentItem.url.toLowerCase().includes('.pdf');
            const isVid = isVideoUrl(currentItem.url);
            const pdfViewerUrl = `https://docs.google.com/gview?url=${encodeURIComponent(currentItem.url)}&embedded=true`;

            return (
                <div className="fixed inset-0 z-[9999] flex items-center justify-center bg-black/95 p-2 md:p-10 transition-opacity">
                    <button onClick={onClose} className="absolute top-4 right-4 md:top-6 md:right-6 bg-red-600 text-white w-10 h-10 rounded-full flex items-center justify-center hover:bg-red-700 z-50 shadow-lg border-2 border-white">
                        <i className="fa-solid fa-xmark text-xl"></i>
                    </button>

                    <div className="w-full h-full max-w-6xl bg-black rounded-xl overflow-hidden relative flex items-center justify-center shadow-2xl">
                        {isPdf ? (
                            <iframe src={pdfViewerUrl} className="w-full h-full border-0 bg-white" title="PDF Preview"></iframe>
                        ) : isVid ? (
                            <video src={currentItem.url} controls autoPlay className="max-w-full max-h-full outline-none" playsInline></video>
                        ) : (
                            <img src={currentItem.url} alt="Preview" className="max-w-full max-h-full object-contain" decoding="async" />
                        )}

                        {previewData.items.length > 1 && (
                            <>
                                <button onClick={(e) => { e.stopPropagation(); onNavigate('prev'); }} className="absolute left-4 top-1/2 -translate-y-1/2 bg-black/60 hover:bg-black/90 text-white w-10 h-10 md:w-12 md:h-12 rounded-full flex items-center justify-center">
                                    <i className="fa-solid fa-chevron-left text-lg md:text-xl"></i>
                                </button>
                                <button onClick={(e) => { e.stopPropagation(); onNavigate('next'); }} className="absolute right-4 top-1/2 -translate-y-1/2 bg-black/60 hover:bg-black/90 text-white w-10 h-10 md:w-12 md:h-12 rounded-full flex items-center justify-center">
                                    <i className="fa-solid fa-chevron-right text-lg md:text-xl"></i>
                                </button>
                            </>
                        )}
                    </div>
                </div>
            );
        };

        const AdSlot = ({ id }) => {
            const adRef = useRef(null);
            const[hasAd, setHasAd] = useState(false);
            useEffect(() => { if (adRef.current && adRef.current.innerHTML.trim() !== "") setHasAd(true); },[]);
            return <div ref={adRef} className={`ad-container w-full transition-all ${hasAd ? 'my-6 py-4 bg-gray-50 border' : 'h-0 overflow-hidden'}`}></div>;
        };

        const SectionView = ({ type, title, icon, data, hideYearFilter = false, showSystemFilter = false, onBack, onPreviewSingle, onRequestDownload, initialFilters, showToast, highlightedItemId }) => {

            const[filterYear, setFilterYear] = useState(initialFilters?.year || 'اختار الفرقة');
            const[filterSystem, setFilterSystem] = useState(initialFilters?.system || 'اختار النظام'); 
            
            // تحميل 6 بطاقات فقط في البداية لسرعة خارقة في فتح الصفحة
            const[visibleCount, setVisibleCount] = useState(6);

            const years = type === 'training' 
                ?['اختار الفرقة', 'الفرقة الأولى', 'الفرقة الثانية', 'الفرقة الثالثة', 'الفرقة الرابعة', 'كل الفرق'] 
                :['اختار الفرقة', 'الفرقة الأولى', 'الفرقة الثانية', 'الفرقة الثالثة', 'الفرقة الرابعة'];
                
            const systems =['اختار النظام', 'انتظام', 'انتساب'];

            const filtered = useMemo(() => {
                return data.filter(item => {
                    const matchYear = hideYearFilter || filterYear === 'اختار الفرقة' || item.year === filterYear || item.year === 'كل الفرق' || item.year === 'عام';
                    const itemSystem = item.studySystem || 'عام';
                    const matchSystem = !showSystemFilter || filterSystem === 'اختار النظام' || itemSystem === 'عام' || itemSystem === filterSystem;
                    return matchYear && matchSystem;
                });
            },[data, filterYear, filterSystem, hideYearFilter, showSystemFilter]);

            useEffect(() => {
                if(highlightedItemId) {
                    const itemIndex = filtered.findIndex(i => i.id === highlightedItemId);
                    if(itemIndex >= visibleCount) {
                        setVisibleCount(itemIndex + 12);
                    }
                }
            },[highlightedItemId, filtered]);

            const visibleData = filtered.slice(0, visibleCount);

            const isA4Card = type === 'lectures' || type === 'notes' || type === 'reviews';
            const isActivities = type === 'activities';
            const thumbType = isA4Card ? 'a4' : 'default';

            const formatWhatsApp = (phone) => {
                if(!phone) return '';
                let cleanPhone = phone.replace(/\D/g, '');
                if(cleanPhone.startsWith('0')) cleanPhone = '2' + cleanPhone;
                return `https://wa.me/${cleanPhone}`;
            };

            const formatDate = (timestamp) => {
                if (!timestamp) return '';
                const d = new Date(timestamp);
                return `${d.getDate()}/${d.getMonth()+1}/${d.getFullYear()}`;
            };

            const handleShareSection = async () => {
                const url = new URL(window.location.origin + window.location.pathname);
                url.searchParams.set('page', type);

                const yMap = {'الفرقة الأولى':'1', 'الفرقة الثانية':'2', 'الفرقة الثالثة':'3', 'الفرقة الرابعة':'4', 'كل الفرق':'all'};
                const sMap = {'انتظام':'r', 'انتساب':'a'};

                if (!hideYearFilter && filterYear !== 'اختار الفرقة') {
                    url.searchParams.set('y', yMap[filterYear] || filterYear);
                }
                if (showSystemFilter && filterSystem !== 'اختار النظام') {
                    url.searchParams.set('s', sMap[filterSystem] || filterSystem);
                }

                try {
                    if (navigator.share) {
                        await navigator.share({ title: `قسم ${title} - كلية التجارة`, url: url.toString() });
                    } else {
                        await navigator.clipboard.writeText(url.toString());
                        showToast("تم نسخ رابط القسم", "success");
                    }
                } catch (e) {}
            };

            const handleShareCard = async (item) => {
                const url = new URL(window.location.origin + window.location.pathname);
                url.searchParams.set('page', type);
                url.searchParams.set('item', item.id);
                try {
                    if (navigator.share) {
                        await navigator.share({ title: item.title, text: `شاهد: ${item.title}`, url: url.toString() });
                    } else {
                        await navigator.clipboard.writeText(url.toString());
                        showToast("تم نسخ رابط الملف", "success");
                    }
                } catch (e) {}
            };

            let gridClass = "grid gap-3 md:gap-4 ";
            if (isActivities) {
                gridClass = "columns-2 md:columns-3 gap-3 space-y-3";
            } else {
                gridClass += "grid-cols-1 sm:grid-cols-2 lg:grid-cols-3";
            }

            return (
                <div className="bg-soft-white p-3 md:p-4 rounded-xl shadow-sm border border-blue-900/10">

                    {/* تعديل رأس القسم: تصغير الأحجام وجعلها في سطر واحد */}
                    <div className="flex flex-nowrap items-center justify-between mb-3 border-b border-gray-100 pb-2 gap-1.5 overflow-x-auto hide-scrollbar">
                        <div className="flex items-center gap-1.5 flex-shrink-0">
                            <button onClick={onBack} className="text-gray-500 hover:text-blue-900 bg-gray-100 hover:bg-gray-200 w-6 h-6 md:w-7 md:h-7 rounded-full flex items-center justify-center flex-shrink-0">
                                <i className="fa-solid fa-arrow-right text-[10px]"></i>
                            </button>
                            <div className="text-blue-900 text-xs hidden sm:block"><i className={`fa-solid ${icon}`}></i></div>
                            <h2 className="text-xs md:text-sm font-black text-gray-800 whitespace-nowrap">{title}</h2>
                        </div>

                        <div className="flex items-center gap-1.5 flex-shrink-0">
                            {(!hideYearFilter || showSystemFilter) && (
                                <>
                                    {!hideYearFilter && (
                                        <div className="relative">
                                            <select 
                                                value={filterYear} 
                                                onChange={(e) => {setFilterYear(e.target.value); setVisibleCount(6);}} 
                                                className="appearance-none bg-blue-900 text-white text-[9px] md:text-[10px] font-bold rounded-md pl-5 pr-2 py-1 outline-none cursor-pointer shadow-sm border border-blue-800"
                                            >
                                                {years.map(y => <option key={y} value={y}>{y}</option>)}
                                            </select>
                                            <i className="fa-solid fa-chevron-down absolute left-1.5 top-1/2 -translate-y-1/2 text-white text-[8px] pointer-events-none"></i>
                                        </div>
                                    )}

                                    {showSystemFilter && (
                                        <div className="relative">
                                            <select 
                                                value={filterSystem} 
                                                onChange={(e) => {setFilterSystem(e.target.value); setVisibleCount(6);}} 
                                                className="appearance-none bg-blue-900 text-white text-[9px] md:text-[10px] font-bold rounded-md pl-5 pr-2 py-1 outline-none cursor-pointer shadow-sm border border-blue-800"
                                            >
                                                {systems.map(s => <option key={s} value={s}>{s}</option>)}
                                            </select>
                                            <i className="fa-solid fa-chevron-down absolute left-1.5 top-1/2 -translate-y-1/2 text-white text-[8px] pointer-events-none"></i>
                                        </div>
                                    )}
                                </>
                            )}

                            <button onClick={handleShareSection} className="bg-gray-100 text-blue-900 hover:bg-blue-100 w-6 h-6 md:w-7 md:h-7 rounded-md flex items-center justify-center border border-gray-200">
                                <i className="fa-solid fa-share-nodes text-[10px]"></i>
                            </button>
                        </div>
                    </div>

                    <div className={gridClass}>
                        {visibleData.length === 0 ? (
                            <div className="col-span-full text-center py-12 text-gray-400 text-sm font-bold">لا توجد بيانات متاحة حالياً.</div>
                        ) : (
                            visibleData.map(item => {
                                const isVid = isVideoUrl(item.fileUrl);

                                if (isActivities) {
                                    return (
                                        <div key={item.id} id={`card-${item.id}`} className={`optimized-card break-inside-avoid relative rounded-xl overflow-hidden cursor-pointer shadow-sm hover:shadow-md group border border-gray-200 bg-black ${highlightedItemId === item.id ? 'highlight-item' : ''}`} onClick={() => onPreviewSingle(item.fileUrl)}>
                                            <button onClick={(e) => { e.stopPropagation(); handleShareCard(item); }} className="absolute bottom-3 left-3 bg-white/90 text-blue-900 w-8 h-8 rounded-full flex items-center justify-center shadow-lg z-30 hover:bg-white">
                                                <i className="fa-solid fa-share-nodes text-xs"></i>
                                            </button>

                                            {isVid && (
                                                <div className="absolute inset-0 flex items-center justify-center z-20 pointer-events-none">
                                                    <div className="w-10 h-10 bg-black/60 rounded-full flex items-center justify-center text-white border-2 border-white/50 backdrop-blur-sm">
                                                        <i className="fa-solid fa-play ml-1 text-sm"></i>
                                                    </div>
                                                </div>
                                            )}

                                            <img 
                                                src={getThumbnail(item.fileUrl, 'default')} 
                                                alt={item.title} 
                                                loading="lazy" 
                                                decoding="async"
                                                className="w-full h-auto object-cover opacity-90 group-hover:opacity-100" 
                                                onError={(e) => { e.target.src = 'https://via.placeholder.com/300x300?text=Activity' }} 
                                            />

                                            <div className="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-black/90 to-transparent p-3 pt-8 text-white z-10 pointer-events-none">
                                                <h4 className="font-bold text-[11px] md:text-xs leading-tight drop-shadow-lg line-clamp-2">{item.title}</h4>
                                            </div>
                                        </div>
                                    );
                                }

                                return (
                                    <div key={item.id} id={`card-${item.id}`} className={`optimized-card flex flex-row sm:flex-col gap-3 p-2.5 border border-blue-900/10 rounded-xl hover:shadow-md bg-white relative animate-fade-in overflow-hidden ${highlightedItemId === item.id ? 'highlight-item' : ''}`}>

                                        <div className={`relative flex-shrink-0 rounded-lg overflow-hidden bg-gray-50 border border-gray-100 cursor-pointer flex items-center justify-center ${isA4Card ? 'w-20 h-28 sm:w-full sm:h-48' : 'w-24 h-24 sm:w-full sm:h-40'}`} onClick={() => onPreviewSingle(item.fileUrl)}>
                                            <img 
                                                src={getThumbnail(item.fileUrl, thumbType)} 
                                                alt={item.title} 
                                                loading="lazy" 
                                                decoding="async"
                                                className="w-full h-full object-cover" 
                                                onError={(e) => { e.target.src = 'https://via.placeholder.com/300x300?text=File' }} 
                                            />
                                            
                                            {item.fileUrl?.endsWith('.pdf') && <div className="absolute bottom-1 right-1 bg-red-600 text-white text-[9px] px-1.5 rounded font-bold shadow z-10">PDF</div>}
                                            
                                            {isVid && (
                                                <div className="absolute inset-0 flex items-center justify-center z-20 bg-black/10">
                                                    <div className="w-8 h-8 sm:w-10 sm:h-10 bg-black/70 rounded-full flex items-center justify-center text-white border-2 border-white/50 backdrop-blur-sm">
                                                        <i className="fa-solid fa-play ml-1 text-xs sm:text-sm"></i>
                                                    </div>
                                                </div>
                                            )}

                                            {showSystemFilter && item.studySystem && item.studySystem !== 'عام' && (
                                                <div className="absolute top-0 right-0 bg-yellow-400 text-blue-900 text-[9px] font-black px-2 py-0.5 rounded-bl-lg z-20 shadow-sm">
                                                    {item.studySystem}
                                                </div>
