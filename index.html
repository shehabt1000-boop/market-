                                        <div className="flex flex-col flex-grow justify-between min-w-0 py-0.5">
                                            <div>
                                                <div className="flex items-center justify-between mb-1.5">
                                                    {!hideYearFilter && (
                                                        <span className="text-[9px] bg-blue-50 text-blue-700 px-1.5 py-0.5 rounded font-bold border border-blue-100 truncate max-w-[60%]">{item.year}</span>
                                                    )}
                                                    {item.createdAt && (
                                                        <span className="text-[9px] text-gray-400 font-bold" dir="ltr">
                                                            {formatDate(item.createdAt)}
                                                        </span>
                                                    )}
                                                </div>
                                                <h4 className="font-bold text-gray-800 leading-snug text-[11px] md:text-xs line-clamp-2" title={item.title}>{item.title}</h4>

                                                {item.description && (
                                                    <div className="mt-1.5 text-[9px] md:text-[10px] text-gray-600 bg-soft-white border border-gray-100 p-1.5 rounded-lg max-h-16 overflow-y-auto sidebar-scroll whitespace-pre-wrap leading-relaxed">
                                                        {item.description}
                                                    </div>
                                                )}
                                            </div>

                                            <div className="flex flex-wrap gap-1.5 mt-2">
                                                {isA4Card && item.fileUrl && (
                                                    <>
                                                        <button onClick={() => onPreviewSingle(item.fileUrl)} className="flex-1 bg-blue-50 text-blue-900 text-[10px] py-1.5 rounded-lg font-bold text-center hover:bg-blue-100 flex items-center justify-center gap-1 border border-blue-100">
                                                            <i className={`fa-solid ${isVid ? 'fa-play' : 'fa-eye'}`}></i> {isVid ? 'تشغيل' : 'معاينة'}
                                                        </button>
                                                        <button onClick={() => onRequestDownload(item.fileUrl, item.title)} className="flex-1 bg-blue-900 text-white text-[10px] py-1.5 rounded-lg font-bold text-center hover:bg-blue-800 flex items-center justify-center gap-1">
                                                            <i className="fa-solid fa-download"></i> تحميل
                                                        </button>
                                                    </>
                                                )}

                                                {item.link && (
                                                    <a href={item.link} target="_blank" className="flex-1 bg-red-50 text-red-700 text-[10px] py-1.5 rounded-lg font-bold text-center hover:bg-red-100 truncate flex items-center justify-center gap-1 border border-red-100">
                                                        <i className="fa-brands fa-youtube"></i> رابط
                                                    </a>
                                                )}

                                                {item.phone && (
                                                    <>
                                                        <a href={formatWhatsApp(item.phone)} target="_blank" className="flex-1 bg-green-500 text-white text-[10px] py-1.5 rounded-lg font-bold text-center hover:bg-green-600 flex items-center justify-center gap-1">
                                                            <i className="fa-brands fa-whatsapp"></i> واتساب
                                                        </a>
                                                        <a href={`tel:${item.phone}`} className="w-8 bg-gray-800 text-white text-[10px] py-1.5 rounded-lg font-bold text-center hover:bg-gray-900 flex items-center justify-center">
                                                            <i className="fa-solid fa-phone"></i>
                                                        </a>
                                                    </>
                                                )}

                                                <button onClick={() => handleShareCard(item)} className="w-8 bg-gray-100 text-gray-700 text-[10px] py-1.5 rounded-lg font-bold text-center hover:bg-gray-200 flex items-center justify-center border border-gray-200" title="مشاركة الملف">
                                                    <i className="fa-solid fa-share-nodes"></i>
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                );
                            })
                        )}
                    </div>

                    {visibleCount < filtered.length && (
                        <div className="text-center mt-5">
                            <button onClick={() => setVisibleCount(prev => prev + 12)} className="bg-white text-gray-700 px-6 py-2 rounded-full font-bold text-xs hover:bg-gray-50 border border-gray-200 shadow-sm">
                                عرض المزيد <i className="fa-solid fa-angle-down mr-1"></i>
                            </button>
                        </div>
                    )}
                </div>
            );
        };

        const App = () => {
            const[user, setUser] = useState(null);
            const[isAdmin, setIsAdmin] = useState(false);
            const[page, setPage] = useState('home');
            const[initialFilters, setInitialFilters] = useState({ year: 'اختار الفرقة', system: 'اختار النظام' });
            const[highlightedItemId, setHighlightedItemId] = useState(null);
            const[materials, setMaterials] = useState([]);
            const[schedules, setSchedules] = useState([]);
            const[isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
            const[previewData, setPreviewData] = useState({ items:[], index: -1 });
            const[downloadItem, setDownloadItem] = useState(null); 
            const[toast, setToast] = useState({ message: '', type: '' });
            
            // حالة فتح المتصفح الداخلي
            const[externalSiteOpen, setExternalSiteOpen] = useState(false);

            const showToast = (message, type = 'info', duration = 2500) => {
                setToast({ message, type });
                if (duration) setTimeout(() => setToast({ message: '', type: '' }), duration);
            };

            const openSinglePreview = (url) => {
                if(url) setPreviewData({ items: [{ url }], index: 0 });
            };

            const openSliderPreview = (schedulesArray, clickedIndex) => {
                const items = schedulesArray.map(s => ({ url: s.url }));
                setPreviewData({ items, index: clickedIndex });
            };

            const handleModalNavigate = (direction) => {
                setPreviewData(prev => {
                    let newIdx = prev.index;
                    if(direction === 'next') newIdx = (prev.index + 1) % prev.items.length;
                    if(direction === 'prev') newIdx = (prev.index - 1 + prev.items.length) % prev.items.length;
                    return { ...prev, index: newIdx };
                });
            };

            const handleCleanSite = () => {
                localStorage.clear();
                sessionStorage.clear();
                window.location.reload(true);
            };

            const handleRequestDownload = (url, title) => {
                setDownloadItem({ url, title });
            };

            const executeDownload = async () => {
                if (!downloadItem) return;
                const { url, title } = downloadItem;
                setDownloadItem(null);

                showToast("جاري تجهيز الملف...", "info", 2000);

                try {
                    const dlUrl = url.includes('cloudinary.com') ? url.replace('/upload/', '/upload/fl_attachment/') : url;
                    const response = await fetch(dlUrl);
                    if (!response.ok) throw new Error('Network error');

                    const blob = await response.blob();
                    const blobUrl = window.URL.createObjectURL(blob);
                    const link = document.createElement('a');
                    link.href = blobUrl;

                    let ext = 'pdf'; 
                    if (url.includes('.')) {
                        const parts = url.split('.');
                        ext = parts[parts.length - 1].split('?')[0].split('#')[0];
                    }

                    link.download = `${title}.${ext}`;
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    window.URL.revokeObjectURL(blobUrl);

                    showToast("بدأ التحميل بنجاح", "success");
                } catch (error) {
                    const dlUrl = url.includes('cloudinary.com') ? url.replace('/upload/', '/upload/fl_attachment/') : url;
                    const link = document.createElement('a');
                    link.href = dlUrl;
                    link.download = title;
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                }
            };

            useEffect(() => {
                document.body.style.overflow = 'hidden';

                const params = new URLSearchParams(window.location.search);
                const pageParam = params.get('page');
                const itemParam = params.get('item');

                const resolveYear = (val) => {
                    if(!val) return 'اختار الفرقة';
                    if(val === '1') return 'الفرقة الأولى';
                    if(val === '2') return 'الفرقة الثانية';
                    if(val === '3') return 'الفرقة الثالثة';
                    if(val === '4') return 'الفرقة الرابعة';
                    if(val === 'all') return 'كل الفرق';
                    if(val.includes('الفرقة') || val === 'كل الفرق') return val; 
                    return 'اختار الفرقة';
                };
                const resolveSystem = (val) => {
                    if(!val) return 'اختار النظام';
                    if(val === 'r') return 'انتظام';
                    if(val === 'a') return 'انتساب';
                    if(val === 'انتظام' || val === 'انتساب') return val; 
                    return 'اختار النظام';
                };

                if (pageParam) {
                    setPage(pageParam);
                    setInitialFilters({
                        year: resolveYear(params.get('y') || params.get('year')),
                        system: resolveSystem(params.get('s') || params.get('system'))
                    });

                    if(itemParam) {
                        setHighlightedItemId(itemParam);
                        setTimeout(() => {
                            const el = document.getElementById(`card-${itemParam}`);
                            if(el) {
                                const y = el.getBoundingClientRect().top + window.scrollY - 100;
                                window.scrollTo({ top: y, behavior: 'smooth' });
                            }
                        }, 800);
                    }
                    window.history.replaceState({}, document.title, window.location.pathname);
                }

                let isDataLoaded = false;
                let splashRemoved = false;

                // إخفاء شاشة التحميل فوراً عند جلب البيانات، أو بعد 800 ملي ثانية كحد أقصى (تسريع خارق)
                const hideSplash = () => {
                    if (splashRemoved) return;
                    splashRemoved = true;
                    const splash = document.getElementById('native-splash');
                    if(splash) {
                        splash.style.opacity = '0';
                        document.body.style.overflow = '';
                        setTimeout(() => splash.remove(), 100);
                    }
                };

                setTimeout(hideSplash, 800);

                onAuthStateChanged(auth, (u) => {
                    setUser(u);
                    setIsAdmin(u && u.uid === ADMIN_UID);
                });

                const unsubMat = onSnapshot(collection(db, 'materials'), (snap) => {
                    setMaterials(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                });

                const unsubSch = onSnapshot(collection(db, 'schedules'), (snap) => {
                    setSchedules(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                    isDataLoaded = true;
                    hideSplash();
                });

                return () => { unsubMat(); unsubSch(); };
            },[]);

            const getByType = (type) => materials.filter(m => m.sectionType === type).sort((a,b) => (b.createdAt || 0) - (a.createdAt || 0));

            // جعل التنقل لحظي وسريع جداً بدون تعليق
            const navigate = (pg) => {
                setIsMobileMenuOpen(false);
                setHighlightedItemId(null);
                window.scrollTo(0,0);
                setPage(pg);
            };

            return (
                <div className="min-h-screen flex flex-col relative">

                    <Toast message={toast.message} type={toast.type} />

                    <PreviewModal 
                        previewData={previewData} 
                        onClose={() => setPreviewData({ items:[], index: -1 })} 
                        onNavigate={handleModalNavigate}
                    />

                    {/* المتصفح الداخلي لموقع الخدمات */}
                    {externalSiteOpen && (
                        <div className="fixed inset-0 z-[99999] bg-black flex flex-col animate-fade-in">
                            {/* شريط علوي للمتصفح الداخلي */}
                            <div className="bg-blue-950 text-white h-14 flex items-center justify-between px-4 shadow-md z-10 border-b border-blue-800">
                                <div className="flex items-center gap-2">
                                    <div className="w-8 h-8 bg-white/10 rounded-full flex items-center justify-center">
                                        <i className="fa-solid fa-laptop-file text-blue-300 text-sm"></i>
                                    </div>
                                    <span className="font-bold text-sm md:text-base">خدمات الطلاب</span>
                                </div>
                                <div className="flex items-center gap-3">
                                    <button onClick={() => window.open('https://faculty-of-commerce.netlify.app/', '_blank')} className="text-blue-300 hover:text-white text-[10px] md:text-xs flex items-center gap-1 bg-white/5 px-2 py-1.5 rounded-lg border border-blue-800">
                                        <i className="fa-solid fa-arrow-up-right-from-square"></i> فتح بالمتصفح
                                    </button>
                                    <button onClick={() => setExternalSiteOpen(false)} className="bg-red-600 hover:bg-red-700 w-8 h-8 rounded-full flex items-center justify-center transition-colors shadow-lg border border-red-500">
                                        <i className="fa-solid fa-xmark text-lg"></i>
                                    </button>
                                </div>
                            </div>
                            {/* نافذة عرض الموقع */}
                            <div className="flex-1 w-full bg-gray-100 relative overflow-hidden">
                                <div className="absolute inset-0 flex flex-col items-center justify-center z-0">
                                    <i className="fa-solid fa-circle-notch fa-spin text-blue-900 text-3xl mb-2"></i>
                                    <span className="text-blue-900 font-bold text-xs">جاري تحميل الخدمات...</span>
                                </div>
                                <iframe
                                    src="https://faculty-of-commerce.netlify.app/"
                                    className="w-full h-full border-0 absolute inset-0 z-10 bg-white"
                                    title="موقع خدمات الطلاب"
                                    sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-popups-to-escape-sandbox allow-top-navigation-by-user-activation"
                                ></iframe>
                            </div>
                        </div>
                    )}

                    {downloadItem && (
                        <div className="fixed inset-0 z-[9999] bg-black/60 flex items-center justify-center p-4 backdrop-blur-sm">
                            <div className="bg-soft-white rounded-2xl p-6 max-w-sm w-full shadow-2xl text-center">
                                <div className="w-14 h-14 bg-blue-50 rounded-full flex items-center justify-center mx-auto mb-4 text-blue-600 text-2xl border border-blue-200">
                                    <i className="fa-solid fa-cloud-arrow-down"></i>
                                </div>
                                <h3 className="text-base font-bold text-gray-800 mb-2">تأكيد التحميل</h3>
                                <p className="text-gray-500 mb-5 text-xs font-bold leading-relaxed">{downloadItem.title}</p>
                                <div className="flex gap-2">
                                    <button onClick={executeDownload} className="flex-1 bg-blue-600 text-white py-2 rounded-lg text-xs font-bold hover:bg-blue-700">موافق، تحميل</button>
                                    <button onClick={() => setDownloadItem(null)} className="flex-1 bg-gray-200 text-gray-800 py-2 rounded-lg text-xs font-bold hover:bg-gray-300">إلغاء</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Navbar من التصميم الأصلي الفخم */}
                    <nav className="bg-blue-900 text-white sticky top-0 z-40 shadow-lg border-b-2 border-yellow-500">
                        <div className="w-full px-4 lg:px-8 flex justify-between items-center h-14 md:h-16">
                            <div className="flex items-center gap-2 cursor-pointer" onClick={() => navigate('home')}>
                                <div className="w-8 h-8 md:w-10 md:h-10 bg-white rounded-full flex items-center justify-center text-blue-900 shadow-inner">
                                    <i className="fa-solid fa-graduation-cap text-sm md:text-lg"></i>
                                </div>
                                <span className="font-black text-base md:text-xl tracking-tighter">تجارة الزقازيق</span>
                            </div>

                            <div className="hidden lg:flex items-center gap-1 text-xs md:text-sm">
                                <button onClick={() => navigate('home')} className={`px-3 py-4 md:py-5 ${page === 'home' ? 'nav-link-active' : ''}`}>الرئيسية</button>
                                <button onClick={() => navigate('lectures')} className={`px-3 py-4 md:py-5 ${page === 'lectures' ? 'nav-link-active' : ''}`}>المحاضرات</button>
                                <button onClick={() => navigate('notes')} className={`px-3 py-4 md:py-5 ${page === 'notes' ? 'nav-link-active' : ''}`}>المذكرات</button>
                                <button onClick={() => navigate('reviews')} className={`px-3 py-4 md:py-5 ${page === 'reviews' ? 'nav-link-active' : ''}`}>المراجعات</button>
                                <button onClick={() => navigate('activities')} className={`px-3 py-4 md:py-5 ${page === 'activities' ? 'nav-link-active' : ''}`}>الأنشطة</button>
                                <button onClick={() => navigate('training')} className={`px-3 py-4 md:py-5 ${page === 'training' ? 'nav-link-active' : ''}`}>التدريب</button>
                                <button onClick={() => navigate('jobs')} className={`px-3 py-4 md:py-5 ${page === 'jobs' ? 'nav-link-active' : ''}`}>الوظائف</button>

                                <button onClick={() => navigate(isAdmin ? 'adminDash' : 'admin')} className="mr-3 bg-gradient-to-l from-yellow-400 to-yellow-500 text-blue-950 px-4 py-1.5 rounded-full font-black text-[10px] md:text-xs shadow-sm flex items-center gap-1.5">
                                    <i className={`fa-solid ${isAdmin ? 'fa-user-shield' : 'fa-right-to-bracket'}`}></i>
                                    {isAdmin ? 'الإدارة' : 'دخول'}
                                </button>
                            </div>

                            <button className="lg:hidden text-xl p-2" onClick={() => setIsMobileMenuOpen(true)}>
                                <i className="fa-solid fa-bars"></i>
                            </button>
                        </div>
                    </nav>

                    <div className={`fixed inset-0 bg-black/50 z-[100] transition-opacity lg:hidden ${isMobileMenuOpen ? 'opacity-100 visible' : 'opacity-0 invisible'}`} onClick={() => setIsMobileMenuOpen(false)}></div>

                    {/* Sidebar من التصميم الأصلي */}
                    <div className={`fixed top-0 right-0 max-h-[100dvh] h-fit pb-3 rounded-bl-3xl w-56 md:w-64 bg-soft-white z-[101] shadow-2xl transform transition-transform lg:hidden flex flex-col ${isMobileMenuOpen ? 'translate-x-0' : 'translate-x-full'}`}>
                        <div className="bg-blue-900 text-white p-3 md:p-4 flex justify-between items-center border-b-2 border-yellow-500 rounded-bl-sm">
                            <span className="font-bold text-sm md:text-base">القائمة</span>
                            <button onClick={() => setIsMobileMenuOpen(false)} className="text-lg md:text-xl"><i className="fa-solid fa-xmark"></i></button>
                        </div>
                        <div className="flex flex-col p-3 gap-1.5 overflow-y-auto sidebar-scroll">
                            <SidebarBtn icon="fa-house" label="الرئيسية" active={page==='home'} onClick={() => navigate('home')} />
                            <SidebarBtn icon="fa-person-chalkboard" label="المحاضرات" active={page==='lectures'} onClick={() => navigate('lectures')} />
                            <SidebarBtn icon="fa-book" label="المذكرات" active={page==='notes'} onClick={() => navigate('notes')} />
                            <SidebarBtn icon="fa-file-shield" label="المراجعات" active={page==='reviews'} onClick={() => navigate('reviews')} />
                            <SidebarBtn icon="fa-users-gear" label="الأنشطة العامة" active={page==='activities'} onClick={() => navigate('activities')} />
                            <SidebarBtn icon="fa-graduation-cap" label="التدريب والكورسات" active={page==='training'} onClick={() => navigate('training')} />
                            <SidebarBtn icon="fa-briefcase" label="الوظائف" active={page==='jobs'} onClick={() => navigate('jobs')} />
                            <SidebarBtn icon="fa-map-location" label="دليل الطالب" active={page==='guide'} onClick={() => navigate('guide')} />
                            <SidebarBtn icon="fa-circle-info" label="من نحن" active={page==='about'} onClick={() => navigate('about')} />

                            <hr className="my-1 border-gray-200 w-full" />

                            <button onClick={handleCleanSite} className="flex items-center justify-center gap-1.5 w-full p-2 rounded-lg font-black text-[10px] md:text-xs bg-gradient-to-r from-emerald-400 to-teal-500 text-white shadow-sm mt-1 border border-teal-600">
                                <i className="fa-solid fa-broom"></i>
                                تنظيف الموقع
                            </button>

                            <button onClick={() => navigate(isAdmin ? 'adminDash' : 'admin')} className="flex items-center justify-center gap-1.5 w-full p-2 rounded-lg font-black text-[10px] md:text-xs bg-gradient-to-r from-yellow-400 to-yellow-500 text-blue-950 shadow-sm mt-1 border border-yellow-600">
                                <i className={`fa-solid ${isAdmin ? 'fa-user-shield' : 'fa-right-to-bracket'}`}></i>
                                {isAdmin ? 'الإدارة' : 'تسجيل الدخول'}
                            </button>
                        </div>
                    </div>

                    <main className="flex-grow container mx-auto px-3 md:px-4 py-4 md:py-6 max-w-5xl relative">

                        <AdSlot id="top-ad" />

                        {page === 'home' && (
                            <div className="space-y-6 md:space-y-8">
                                <div className="relative rounded-2xl md:rounded-3xl overflow-hidden h-48 md:h-56 shadow-lg">
                                    <img src="https://res.cloudinary.com/dsxrjmcxs/image/upload/c_fill,g_auto,w_1364,h_768,q_auto:eco,f_auto/v1776437104/sm5iuilfl3r1fkmg7jyh.png" className="w-full h-full object-cover" alt="الكلية" decoding="async" loading="lazy" />
                                    {/* توسيط النصوص في الهيرو سيكشن */}
                                    <div className="absolute inset-0 bg-gradient-to-r from-blue-950/85 via-blue-900/45 to-transparent flex flex-col justify-center items-center text-center px-6 md:px-8 text-white">
                                        <h2 className="text-2xl md:text-3xl font-black mb-1 md:mb-2 drop-shadow-lg">بوابة كلية التجارة</h2>
                                        <p className="opacity-90 font-bold text-xs md:text-sm drop-shadow-md">جامعة الزقازيق - شهاب طارق صلاح</p>
                                    </div>
                                </div>

                                <HomeSlider schedules={schedules} onPreviewSlider={openSliderPreview} />

                                <div className="grid grid-cols-2 md:grid-cols-4 gap-3 md:gap-4">
                                    <HomeCard icon="fa-person-chalkboard" label="المحاضرات" color="bg-blue-600" onClick={() => navigate('lectures')} />
                                    <HomeCard icon="fa-book" label="المذكرات" color="bg-indigo-600" onClick={() => navigate('notes')} />
                                    <HomeCard icon="fa-file-shield" label="المراجعات" color="bg-red-600" onClick={() => navigate('reviews')} />
                                    <HomeCard icon="fa-users-gear" label="الأنشطة" color="bg-green-600" onClick={() => navigate('activities')} />
                                    <HomeCard icon="fa-graduation-cap" label="التدريب" color="bg-orange-600" onClick={() => navigate('training')} />
                                    <HomeCard icon="fa-briefcase" label="الوظائف" color="bg-cyan-600" onClick={() => navigate('jobs')} />
                                    <HomeCard icon="fa-map-location" label="دليل الطالب" color="bg-gray-600" onClick={() => navigate('guide')} />
                                    <HomeCard icon="fa-circle-info" label="من نحن" color="bg-gray-600" onClick={() => navigate('about')} />
                                    
                                    {/* بطاقة موقع الخدمات (بحجم بطاقتين) تفتح في المتصفح الداخلي */}
                                    <div 
                                        onClick={() => setExternalSiteOpen(true)}
                                        className="col-span-2 md:col-span-2 bg-gradient-to-r from-blue-800 to-indigo-900 p-3 md:p-4 rounded-xl text-white flex items-center gap-3 shadow-md hover:shadow-lg cursor-pointer border border-blue-400/30 transition-all group"
                                    >
                                        <div className="w-10 h-10 md:w-12 md:h-12 bg-white rounded-full flex items-center justify-center text-blue-900 shadow-inner flex-shrink-0 group-hover:scale-110 transition-transform">
                                            <i className="fa-solid fa-graduation-cap text-lg md:text-xl"></i>
                                        </div>
                                        <div className="flex flex-col justify-center">
                                            <h3 className="font-black text-xs md:text-sm drop-shadow-md leading-tight mb-1">موقع خدمات طلاب كلية تجارة الزقازيق</h3>
                                            <p className="text-[9px] md:text-[11px] text-blue-200 font-bold bg-black/20 w-fit px-2 py-0.5 rounded-full">
                                                اضغط لفتح الموقع
                                            </p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {page === 'lectures' && <SectionView type="lectures" title="قسم المحاضرات" icon="fa-person-chalkboard" data={getByType('lectures')} showSystemFilter={true} onBack={() => navigate('home')} onPreviewSingle={openSinglePreview} onRequestDownload={handleRequestDownload} initialFilters={initialFilters} showToast={showToast} highlightedItemId={highlightedItemId} />}
                        {page === 'notes' && <SectionView type="notes" title="قسم المذكرات" icon="fa-book" data={getByType('notes')} showSystemFilter={true} onBack={() => navigate('home')} onPreviewSingle={openSinglePreview} onRequestDownload={handleRequestDownload} initialFilters={initialFilters} showToast={showToast} highlightedItemId={highlightedItemId} />}
                        {page === 'reviews' && <SectionView type="reviews" title="قسم المراجعات والامتحانات" icon="fa-file-shield" data={getByType('reviews')} showSystemFilter={true} onBack={() => navigate('home')} onPreviewSingle={openSinglePreview} onRequestDownload={handleRequestDownload} initialFilters={initialFilters} showToast={showToast} highlightedItemId={highlightedItemId} />}

                        {page === 'activities' && <SectionView type="activities" title="معرض الأنشطة العام" icon="fa-users-gear" data={getByType('activities')} hideYearFilter={true} onBack={() => navigate('home')} onPreviewSingle={openSinglePreview} onRequestDownload={handleRequestDownload} initialFilters={initialFilters} showToast={showToast} highlightedItemId={highlightedItemId} />}
                        {page === 'training' && <SectionView type="training" title="التدريب والكورسات" icon="fa-graduation-cap" data={getByType('training')} onBack={() => navigate('home')} onPreviewSingle={openSinglePreview} onRequestDownload={handleRequestDownload} initialFilters={initialFilters} showToast={showToast} highlightedItemId={highlightedItemId} />}
                        {page === 'jobs' && <SectionView type="jobs" title="الوظائف المتاحة" icon="fa-briefcase" data={getByType('jobs')} hideYearFilter={true} onBack={() => navigate('home')} onPreviewSingle={openSinglePreview} onRequestDownload={handleRequestDownload} initialFilters={initialFilters} showToast={showToast} highlightedItemId={highlightedItemId} />}
                        {page === 'guide' && <SectionView type="guide" title="دليل الطالب" icon="fa-map-location" data={getByType('guide')} onBack={() => navigate('home')} onPreviewSingle={openSinglePreview} onRequestDownload={handleRequestDownload} initialFilters={initialFilters} showToast={showToast} highlightedItemId={highlightedItemId} />}

                        {page === 'about' && <AboutPage onBack={() => navigate('home')} />}
                        {page === 'admin' && !isAdmin && <AdminLogin onSuccess={() => { showToast("تم تسجيل الدخول بنجاح", "success"); navigate('adminDash'); }} showToast={showToast} />}
                        {page === 'adminDash' && isAdmin && <AdminDashboard materials={materials} schedules={schedules} onBack={() => navigate('home')} showToast={showToast} />}

                        <AdSlot id="bottom-ad" />
                    </main>

                    {/* Bottom Nav: تكبير مساحة الضغط بشكل مريح جداً */}
                    <div className="lg:hidden fixed bottom-0 w-full bg-soft-white border-t border-blue-900/10 flex text-blue-900 z-50 shadow-[0_-4px_15px_rgba(0,0,0,0.03)] rounded-t-xl overflow-hidden">
                        <button onClick={() => navigate('home')} className={`flex-1 flex flex-col items-center justify-center py-3 ${page === 'home' ? 'text-yellow-600 bg-blue-50/50' : 'text-blue-900 hover:bg-gray-50'}`}>
                            <i className="fa-solid fa-house text-lg"></i><span className="text-[10px] mt-1 font-bold">الرئيسية</span>
                        </button>
                        <button onClick={() => navigate('lectures')} className={`flex-1 flex flex-col items-center justify-center py-3 ${page === 'lectures' ? 'text-yellow-600 bg-blue-50/50' : 'text-blue-900 hover:bg-gray-50'}`}>
                            <i className="fa-solid fa-person-chalkboard text-lg"></i><span className="text-[10px] mt-1 font-bold">المحاضرات</span>
                        </button>
                        <button onClick={() => navigate('notes')} className={`flex-1 flex flex-col items-center justify-center py-3 ${page === 'notes' ? 'text-yellow-600 bg-blue-50/50' : 'text-blue-900 hover:bg-gray-50'}`}>
                            <i className="fa-solid fa-book text-lg"></i><span className="text-[10px] mt-1 font-bold">المذكرات</span>
                        </button>
                        <button onClick={() => navigate('activities')} className={`flex-1 flex flex-col items-center justify-center py-3 ${page === 'activities' ? 'text-yellow-600 bg-blue-50/50' : 'text-blue-900 hover:bg-gray-50'}`}>
                            <i className="fa-solid fa-users-gear text-lg"></i><span className="text-[10px] mt-1 font-bold">الأنشطة</span>
                        </button>
                    </div>

                    { (page === 'home' || page === 'about') && (
                        <footer className="bg-blue-950 text-white py-10 text-center mt-8 border-t-4 border-yellow-500">
                            <div className="container mx-auto px-4">
                                <div className="mb-5 flex justify-center gap-5 text-xl">
                                    <a href="#" className="hover:text-yellow-500"><i className="fa-brands fa-facebook"></i></a>
                                    <a href="#" className="hover:text-yellow-500"><i className="fa-brands fa-instagram"></i></a>
                                    <a href="#" className="hover:text-yellow-500"><i className="fa-brands fa-telegram"></i></a>
                                </div>
                                <p className="font-bold mb-1 text-sm">جميع الحقوق محفوظة &copy; {new Date().getFullYear()}</p>
                                <p className="text-xs opacity-60">تصميم وتطوير: شهاب طارق صلاح</p>
                            </div>
                        </footer>
                    )}
                </div>
            );
        };

        const SidebarBtn = ({ icon, label, active, onClick, color="text-gray-700" }) => (
            <button onClick={onClick} className={`flex items-center gap-2 w-full p-2.5 rounded-lg font-bold text-[11px] md:text-xs border-r-4 ${active ? 'bg-blue-50 text-blue-900 border-blue-900' : `border-transparent hover:bg-gray-100 ${color}`}`}>
                <div className="w-5 flex justify-center"><i className={`fa-solid ${icon} text-sm md:text-base`}></i></div>
                <span className="text-right flex-1">{label}</span>
            </button>
        );

        const HomeCard = ({ icon, label, color, onClick }) => (
            <div onClick={onClick} className={`${color} p-3 md:p-4 rounded-xl text-white flex flex-col items-center justify-center gap-1.5 shadow-sm hover:shadow-md cursor-pointer border border-white/20`}>
                <i className={`fa-solid ${icon} text-xl md:text-2xl`}></i>
                <span className="font-bold text-[10px] md:text-xs">{label}</span>
            </div>
        );

        const HomeSlider = ({ schedules, onPreviewSlider }) => {
            const[idx, setIdx] = useState(0);
            if (!schedules.length) return null;

            return (
                <div className="relative w-full rounded-2xl md:rounded-3xl overflow-hidden shadow-sm border border-gray-200 group">
                    <div className="bg-blue-900 text-white text-center py-1.5 md:py-2 text-xs md:text-sm font-bold border-b border-yellow-500">
                        {schedules[idx].title || 'جداول المحاضرات الرسمية'}
                    </div>
                    <div className="h-40 md:h-72 relative bg-soft-white cursor-pointer overflow-hidden flex items-center justify-center" onClick={() => onPreviewSlider(schedules, idx)}>
                        {/* استخدام الصورة المصغرة للسلايدر لمنع اللاج */}
                        <img src={getThumbnail(schedules[idx].url, 'slider')} className="w-full h-full object-contain scale-[1.02]" decoding="async" />
                        <button onClick={(e) => { e.preventDefault(); e.stopPropagation(); setIdx(i => (i-1+schedules.length)%schedules.length); }} className="absolute left-2 top-1/2 -translate-y-1/2 bg-black/40 hover:bg-black/70 text-white w-7 h-7 rounded-full z-20 flex items-center justify-center"><i className="fa-solid fa-chevron-left text-xs"></i></button>
                        <button onClick={(e) => { e.preventDefault(); e.stopPropagation(); setIdx(i => (i+1)%schedules.length); }} className="absolute right-2 top-1/2 -translate-y-1/2 bg-black/40 hover:bg-black/70 text-white w-7 h-7 rounded-full z-20 flex items-center justify-center"><i className="fa-solid fa-chevron-right text-xs"></i></button>
                    </div>
                    <div className="flex justify-center gap-1 py-1.5 bg-gray-50 border-t border-gray-100">
                        {schedules.map((_, i) => <div key={i} className={`h-1 rounded-full ${i === idx ? 'w-5 bg-blue-900' : 'w-1.5 bg-gray-300'}`}></div>)}
                    </div>
                </div>
            );
        };

        const AdminLogin = ({ onSuccess, showToast }) => {
            const[e, setE] = useState('');
            const[p, setP] = useState('');
            const handle = async () => {
                showToast("جاري التحقق...", "info", 1000);
                try {
                    const cred = await signInWithEmailAndPassword(auth, e, p);
                    if (cred.user.uid === ADMIN_UID) onSuccess();
                    else showToast("ليس لديك صلاحية الدخول", "error");
                } catch { showToast("خطأ في البريد أو كلمة المرور", "error"); }
            };
            return (
                <div className="max-w-md mx-auto bg-soft-white p-6 md:p-8 rounded-xl shadow-sm border border-blue-900/10 mt-6 md:mt-10">
                    <h2 className="text-xl md:text-2xl font-bold mb-6 text-center text-blue-900">تسجيل دخول الإدارة</h2>
                    <input type="email" placeholder="البريد" className="w-full mb-3 border border-gray-200 p-2.5 rounded-lg focus:outline-none focus:border-blue-900 bg-white text-sm" onChange={v=>setE(v.target.value)} />
                    <input type="password" placeholder="كلمة المرور" className="w-full mb-5 border border-gray-200 p-2.5 rounded-lg focus:outline-none focus:border-blue-900 bg-white text-sm" onChange={v=>setP(v.target.value)} />
                    <button onClick={handle} className="w-full bg-blue-900 text-white py-2.5 rounded-lg font-bold hover:bg-blue-800 shadow-sm text-sm">دخول</button>
                </div>
            );
        };

        const AdminDashboard = ({ materials, schedules, onBack, showToast }) => {
            const[title, setTitle] = useState('');
            const[sec, setSec] = useState('lectures');
            const[year, setYear] = useState('الفرقة الأولى');
            const[studySystem, setStudySystem] = useState('عام');
            const[link, setLink] = useState('');
            const[phone, setPhone] = useState('');
            const[description, setDescription] = useState('');
            const[loading, setLoading] = useState(false);
            const[uploadProgress, setUploadProgress] = useState(0);
            const[uploadQueue, setUploadQueue] = useState([]);

            const[confirmDelete, setConfirmDelete] = useState(null);

            const handleFileChange = (e) => {
                const files = Array.from(e.target.files);
                setUploadQueue(files.map(f => {
                    const isMedia = f.type.startsWith('image/') || f.type.startsWith('video/');
                    return { file: f, title: isMedia ? '' : f.name.split('.')[0] };
                }));
            };

            const uploadFileWithProgress = (file, isCompressed) => {
                return new Promise((resolve, reject) => {
                    const xhr = new XMLHttpRequest();
                    xhr.open('POST', `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/auto/upload`);

                    xhr.upload.onprogress = (e) => {
                        if (e.lengthComputable) {
                            const percent = Math.round((e.loaded / e.total) * 100);
                            setUploadProgress(isCompressed ? 40 + Math.floor(percent * 0.6) : percent);
                        }
                    };

                    xhr.onload = () => {
                        if (xhr.status === 200) resolve(JSON.parse(xhr.responseText));
                        else reject(JSON.parse(xhr.responseText));
                    };
                    xhr.onerror = () => reject("Network Error");

                    const formData = new FormData();
                    formData.append('file', file);
                    formData.append('upload_preset', UPLOAD_PRESET);
                    xhr.send(formData);
                });
            };

            const upload = async () => {
                setLoading(true);
                setUploadProgress(0);
                try {
                    const finalStudySystem = (sec === 'lectures' || sec === 'notes' || sec === 'reviews') ? studySystem : 'عام';

                    if (uploadQueue.length > 0) {
                        const hasEmptyTitles = uploadQueue.some(item => !item.title || !item.title.trim());
                        if (hasEmptyTitles) {
                            showToast("الرجاء كتابة وصف/عنوان لجميع الملفات المحددة", "error");
                            setLoading(false);
                            return;
                        }

                        for (let i=0; i<uploadQueue.length; i++) {
                            const item = uploadQueue[i];
                            setUploadProgress(0);

                            let fileUrl = null;
                            let fileToUpload = item.file;
                            let isPdf = fileToUpload.type === 'application/pdf' || fileToUpload.name.toLowerCase().endsWith('.pdf');
                            let isVideo = fileToUpload.type.startsWith('video/');
                            let isCompressed = false;

                            if (fileToUpload.type.startsWith('image/')) {
                                if (fileToUpload.size > 500 * 1024) { 
                                    showToast(`جاري ضغط الصورة (${i+1}/${uploadQueue.length})...`, "info", 0);
                                    try {
                                        fileToUpload = await imageCompression(fileToUpload, { 
                                            maxSizeMB: 0.5, 
                                            maxWidthOrHeight: 1000, 
                                            useWebWorker: true,
                                            initialQuality: 0.6,
                                            onProgress: (p) => setUploadProgress(Math.floor(p * 0.4)) 
                                        });
                                        isCompressed = true;
                                    } catch (e) { 
                                        console.error("Compression failed", e); 
                                    }
                                }
                            }

                            showToast(`جاري الرفع للسيرفر (${i+1}/${uploadQueue.length})...`, "info", 0);
                            const d = await uploadFileWithProgress(fileToUpload, isCompressed);

                            if (!isPdf && !isVideo && d.secure_url.includes('/image/upload/')) {
                                fileUrl = d.secure_url.replace('/upload/', '/upload/w_1000,q_auto,f_auto/');
                            } else {
                                fileUrl = d.secure_url;
                            }

                            if (sec === 'schedule') {
                                await addDoc(collection(db, 'schedules'), { title: item.title, url: fileUrl, createdAt: Date.now() });
                            } else {
                                await addDoc(collection(db, 'materials'), { 
                                    title: item.title, fileUrl: fileUrl, sectionType: sec, 
                                    year: (sec === 'jobs' || sec === 'activities') ? 'عام' : year, 
                                    studySystem: finalStudySystem,
                                    link: sec === 'training' ? link : null, phone: sec === 'jobs' ? phone : null,
                                    description: sec === 'jobs' ? description : null,
                                    createdAt: Date.now(), department: 'عام'
                                });
                            }
                        }
                    } else {
                        if (!title) { showToast("الرجاء كتابة العنوان أولاً", "error"); setLoading(false); return; }
                        showToast("جاري النشر...", "info", 0);
                        await addDoc(collection(db, 'materials'), { 
                            title: title, fileUrl: null, sectionType: sec, 
                            year: (sec === 'jobs' || sec === 'activities') ? 'عام' : year, 
                            studySystem: finalStudySystem,
                            link: sec === 'training' ? link : null, phone: sec === 'jobs' ? phone : null,
                            description: sec === 'jobs' ? description : null,
                            createdAt: Date.now(), department: 'عام'
                        });
                    }

                    showToast("تمت الإضافة بنجاح", "success");
                    setTitle(''); setLink(''); setPhone(''); setDescription(''); setUploadQueue([]); setUploadProgress(0);
                    document.getElementById('fileInput').value = '';
                } catch(e) { 
                    showToast("حدث خطأ أثناء الرفع", "error"); 
                    console.error(e); 
                }
                setLoading(false);
            };

            const requestDelete = (col, id) => {
                setConfirmDelete({ col, id });
            };

            const executeDelete = async () => {
                if (!confirmDelete) return;
                try {
                    await deleteDoc(doc(db, confirmDelete.col, confirmDelete.id));
                    showToast("تم الحذف بنجاح", "success");
                } catch (error) {
                    showToast("حدث خطأ أثناء الحذف", "error");
                }
                setConfirmDelete(null);
            };

            return (
                <div className="bg-soft-white p-4 md:p-6 rounded-xl shadow-sm space-y-6 relative border border-blue-900/10">
                    <div className="flex justify-between items-center border-b border-gray-200 pb-3">
                        <div className="flex items-center gap-2">
                            <button onClick={onBack} className="text-gray-500 hover:text-blue-900 bg-gray-100 hover:bg-gray-200 w-7 h-7 rounded-full flex items-center justify-center border border-gray-200">
                                <i className="fa-solid fa-arrow-right text-xs"></i>
                            </button>
                            <h2 className="text-base md:text-lg font-bold text-blue-900">لوحة التحكم</h2>
                        </div>
                        <button onClick={()=>{signOut(auth); showToast("تم تسجيل الخروج","success");}} className="text-red-600 text-xs font-bold bg-red-50 px-3 py-1.5 rounded-md border border-red-100 hover:bg-red-100">خروج</button>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-3 text-sm">
                        <select className="border border-gray-200 p-2 rounded-lg focus:outline-none focus:border-blue-900 bg-white font-bold text-gray-700" value={sec} onChange={v=>setSec(v.target.value)}>
                            <option value="lectures">قسم المحاضرات</option>
                            <option value="notes">قسم المذكرات</option>
                            <option value="reviews">قسم المراجعات</option>
                            <option value="activities">قسم الأنشطة (عام)</option>
                            <option value="training">قسم التدريب والكورسات</option>
                            <option value="jobs">قسم الوظائف (عام)</option>
                            <option value="guide">دليل الطالب</option>
                            <option value="schedule">جدول محاضرات (سلايدر)</option>
                        </select>

                        {sec !== 'jobs' && sec !== 'activities' && sec !== 'schedule' && (
                            <select className="border border-gray-200 p-2 rounded-lg focus:outline-none focus:border-blue-900 bg-white font-bold text-gray-700" value={year} onChange={v=>setYear(v.target.value)}>
                                <option>الفرقة الأولى</option>
                                <option>الفرقة الثانية</option>
                                <option>الفرقة الثالثة</option>
                                <option>الفرقة الرابعة</option>
                                {sec === 'training' && <option>كل الفرق</option>}
                            </select>
                        )}

                        {(sec === 'lectures' || sec === 'notes' || sec === 'reviews') && (
                            <select className="border border-gray-200 p-2 rounded-lg focus:outline-none focus:border-blue-900 bg-white font-bold text-gray-700 col-span-1 md:col-span-2" value={studySystem} onChange={v=>setStudySystem(v.target.value)}>
                                <option value="عام">عام (يظهر لطلاب الانتظام والانتساب)</option>
                                <option value="انتظام">انتظام فقط</option>
                                <option value="انتساب">انتساب فقط</option>
                            </select>
                        )}

                        {sec === 'training' && <input placeholder="رابط خارجي (مثال: يوتيوب)" value={link} className="border border-gray-200 p-2 rounded-lg focus:outline-none focus:border-blue-900 bg-white" onChange={v=>setLink(v.target.value)} />}
                        {sec === 'jobs' && <input placeholder="رقم الهاتف (للتواصل واتساب/اتصال)" value={phone} className="border border-gray-200 p-2 rounded-lg focus:outline-none focus:border-blue-900 bg-white" onChange={v=>setPhone(v.target.value)} />}

                        {sec === 'jobs' && <textarea placeholder="اكتب تفاصيل ووصف الوظيفة هنا..." value={description} className="border border-gray-200 p-2 rounded-lg focus:outline-none focus:border-blue-900 bg-white col-span-1 md:col-span-2" rows="3" onChange={v=>setDescription(v.target.value)}></textarea>}

                        <div className="flex flex-col col-span-1 md:col-span-2 border-t border-gray-100 pt-3 mt-1">
                            <label className="text-xs font-bold text-blue-900 mb-2 bg-blue-50 p-1.5 rounded border border-blue-100 inline-block w-fit"><i className="fa-solid fa-cloud-arrow-up ml-1"></i> اختر الملفات (صور، PDF، فيديو):</label>
                            <input id="fileInput" type="file" multiple className="border border-gray-200 p-1.5 rounded-lg bg-white cursor-pointer text-xs" onChange={handleFileChange} />
                        </div>

                        {uploadQueue.length === 0 && (
                            <input maxLength={70} placeholder="العنوان (اسم الملف أو الوظيفة - أقصى حد 70 حرف)" value={title} className="border border-gray-200 p-2 rounded-lg col-span-1 md:col-span-2 focus:outline-none focus:border-blue-900 bg-white font-bold" onChange={v=>setTitle(v.target.value)} />
                        )}

                        {uploadQueue.length > 0 && (
                            <div className="col-span-1 md:col-span-2 bg-blue-50 p-3 rounded-lg border border-blue-100 space-y-2">
                                <label className="text-xs font-bold text-blue-900">أضف وصفاً لكل ملف محدد (حد أقصى 70 حرف):</label>
                                {uploadQueue.map((item, idx) => (
                                    <div key={idx} className="flex flex-col sm:flex-row items-center gap-1.5 bg-white p-1.5 rounded border border-gray-200">
                                        <span className="text-[10px] text-gray-500 w-full sm:w-1/3 truncate" dir="ltr">{item.file.name}</span>
                                        <input maxLength={70} className={`border border-gray-200 p-1.5 rounded w-full sm:w-2/3 text-xs focus:outline-none focus:border-blue-900 font-bold bg-gray-50 ${!item.title ? 'border-red-400' : ''}`} value={item.title} placeholder="اكتب العنوان أو الوصف هنا..." onChange={(e) => { const newQ =[...uploadQueue]; newQ[idx].title = e.target.value; setUploadQueue(newQ); }} />
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>

                    <button onClick={upload} disabled={loading} className="w-full bg-green-600 text-white py-2.5 rounded-lg font-bold shadow-sm hover:bg-green-700 flex justify-center items-center gap-2 text-sm">
                        {loading ? (
                            <>
                                <i className="fa-solid fa-circle-notch fa-spin"></i>
                                جاري التنفيذ... {uploadProgress}%
                            </>
                        ) : 'إضافة الآن'}
                    </button>

                    <div className="mt-6 border-t border-gray-200 pt-6">
                        <h3 className="font-bold mb-3 text-blue-900 text-sm">إدارة الملفات المرفوعة:</h3>
                        <div className="space-y-1.5 max-h-56 overflow-y-auto sidebar-scroll pr-1">
                            {materials.map(m => (
                                <div key={m.id} className="flex justify-between items-center p-2 bg-white border border-gray-200 rounded-lg text-xs hover:border-blue-300">
                                    <span className="font-bold line-clamp-1">
                                        {m.title} 
                                        <span className="text-[10px] text-gray-400 font-normal mr-1">({m.sectionType})</span>
                                        {m.studySystem && m.studySystem !== 'عام' && <span className="text-[9px] bg-yellow-50 text-yellow-800 px-1.5 rounded mr-1 border border-yellow-200">{m.studySystem}</span>}
                                    </span>
                                    <button onClick={()=>requestDelete('materials', m.id)} className="text-red-500 hover:text-red-700 bg-red-50 border border-red-100 w-6 h-6 rounded flex items-center justify-center flex-shrink-0"><i className="fa-solid fa-trash text-[10px]"></i></button>
                                </div>
                            ))}
                            {schedules.map(s => (
                                <div key={s.id} className="flex justify-between items-center p-2 bg-yellow-50 border border-yellow-200 rounded-lg text-xs">
                                    <span className="font-bold line-clamp-1 text-yellow-900">{s.title} <span className="text-[10px] text-yellow-600 font-normal">(سلايدر)</span></span>
                                    <button onClick={()=>requestDelete('schedules', s.id)} className="text-red-500 hover:text-red-700 bg-red-50 border border-red-100 w-6 h-6 rounded flex items-center justify-center flex-shrink-0"><i className="fa-solid fa-trash text-[10px]"></i></button>
                                </div>
                            ))}
                        </div>
                    </div>

                    {confirmDelete && (
                        <div className="fixed inset-0 z-[9999] bg-black/60 flex items-center justify-center p-4 backdrop-blur-sm">
                            <div className="bg-soft-white rounded-2xl p-6 max-w-sm w-full shadow-2xl text-center border border-red-200">

                            </div>

                    )}

            );
        };

                <p className="mb-3 text-sm font-bold text-gray-700">تم بناء هذا الموقع لخدمة أكثر من 30 ألف طالب في الكلية، مع التركيز على تحديث المحتوى يومياً.</p>
                <div className="bg-blue-50 p-3 rounded-lg border border-blue-100 shadow-sm mt-5">

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('service-worker.js')
                    .then(registration => {
                        console.log('ServiceWorker registered successfully');
                    })
                    .catch(err => {
                        console.log('ServiceWorker registration failed: ', err);
                    });
            });
        }
